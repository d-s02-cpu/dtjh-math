<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>苗栗大同國中資源中心 - 直角坐標練習</title>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script type="text/javascript" id="MathJax-script" async
        src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.min.js"></script>
    
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #4caf50; 
            --accent-color: #ff9800;
            --success-color: #4caf50;
            --error-color: #f44336;
            --bg-color: #f5f7fa;
            --step-bg: #fffbe6;
        }
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }
        .container {
            background: white; padding: 2rem; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%; max-width: 550px; text-align: center;
        }
        .question-text { font-size: 1.1rem; color: #555; margin-bottom: 0.5rem; text-align: left; }
        #question-box {
            font-size: 1.8rem; margin: 0.5rem 0 1.5rem 0; padding: 1rem;
            background: #f8f9fa; border-radius: 12px; border: 1px solid #eee;
        }
        #canvas-holder {
            display: flex; justify-content: center; margin-bottom: 1rem;
        }
        .step-container {
            margin-top: 1rem; padding: 1rem; border-radius: 15px;
            background: var(--step-bg); border: 1px dashed #ffe58f;
            display: none; 
        }
        .step-title { font-weight: bold; margin-bottom: 10px; color: #856404; display: block; }
        
        .options-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
        }
        
        .btn {
            padding: 1rem; font-size: 1.1rem; border: 2px solid var(--primary-color);
            background: white; border-radius: 10px; cursor: pointer; transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:disabled { cursor: not-allowed; opacity: 0.8; }
        .correct { background: var(--success-color) !important; color: white; border-color: var(--success-color); }
        .wrong { background: var(--error-color) !important; color: white; border-color: var(--error-color); }
        #next-btn {
            margin-top: 1.5rem; padding: 1rem; background: var(--primary-color);
            color: white; border: none; border-radius: 50px; font-size: 1.1rem;
            display: none; width: 100%; cursor: pointer;
        }
        .feedback-text { color: var(--error-color); font-weight: bold; margin-bottom: 10px; min-height: 1.2rem; }
        #quiz-status { display: flex; justify-content: space-between; margin-bottom: 1rem; color: #666; font-weight: bold; align-items: center; }
        .mode-badge { font-size: 0.85rem; padding: 4px 12px; border-radius: 20px; background: #eee; color: #555; }
        
        #start-screen, #quiz-container, #result-screen { display: none; }
        #start-screen { display: block; } 
        
        .score-display { font-size: 3rem; color: var(--primary-color); margin: 1rem 0; }
        .desc-text { color: #666; margin-bottom: 1.5rem; line-height: 1.6; }

        #qrcode-container {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        #qrcode {
            padding: 10px;
            background: white;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>

<div class="container" id="start-screen">
    <h2>苗栗大同國中資源中心</h2>
    <h3>直角坐標平面循序練習</h3>
    <div class="desc-text">
        請選擇練習題型：<br>
        認識點的位置與平移規則。
    </div>
    <div style="display: flex; flex-direction: column; gap: 15px;">
        <button class="btn" style="background: var(--primary-color); color: white; border-color: var(--primary-color);" onclick="startQuiz('findCoordinate')">模式一：判斷點 $P$ 在哪裡</button>
        <button class="btn" style="background: var(--secondary-color); color: white; border-color: var(--secondary-color);" onclick="startQuiz('translation')">模式二：點的平移練習</button>
        <button class="btn" style="background: var(--accent-color); color: white; border-color: var(--accent-color);" onclick="startQuiz('readChart')">模式三：圖形讀取練習</button>
    </div>
    
    <div id="qrcode-container">
        <div id="qrcode"></div>
        <span style="font-size: 0.8rem; color: #888;">掃描 QR Code 分享練習</span>
    </div>
</div>

<div class="container" id="quiz-container">
    <div id="quiz-status">
        <span id="question-number">第 1 題 / 共 10 題</span>
        <span id="mode-badge" class="mode-badge">練習模式</span>
    </div>

    <div class="question-text" id="mode-text">題目載入中...</div>
    
    <div id="canvas-holder"></div>

    <div id="question-box"></div>

    <div id="step1" class="step-container">
        <span class="step-title" id="step1-title">第一步：</span>
        <div class="options-grid" id="options1"></div>
    </div>

    <div id="step2" class="step-container" style="margin-top: 15px;">
        <span class="step-title" id="step2-title">第二步：</span>
        <div class="options-grid" id="options2"></div>
    </div>

    <div id="step3" class="step-container" style="margin-top: 15px;">
        <span class="step-title" id="step3-title">第三步：</span>
        <div class="options-grid" id="options3"></div>
    </div>

    <div id="step4" class="step-container" style="margin-top: 15px;">
        <span class="step-title" id="step4-title">第四步：</span>
        <div class="options-grid" id="options4"></div>
    </div>

    <button id="next-btn" onclick="generateQuestion()">下一題</button>
</div>

<div class="container" id="result-screen">
    <h2>練習完成！</h2>
    <div class="score-display" id="final-score">0</div>
    <p>測驗結束，表現優異！</p>
    <button class="btn" style="width: 100%; background: var(--primary-color); color: white;" onclick="resetQuiz()">回主選單</button>
</div>

<script>
    let quizMode = 'findCoordinate';
    let curX = 0, curY = 0, curK = 0, curDir = '';
    let questionCount = 0;
    let totalScore = 0;
    let isFirstTrySteps = [true, true, true, true];
    let p5Instance = null;
    let isStep2AskingX = true; // 模式三專用，判斷 Step 2 問哪個軸

    function startQuiz(mode) {
        quizMode = mode;
        questionCount = 0;
        totalScore = 0;
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-container').style.display = 'block';
        
        if(mode === 'findCoordinate') {
            document.getElementById('mode-badge').innerText = '模式：位置判斷';
            document.getElementById('mode-text').innerText = '請判斷點 $P$ 所在的象限或坐標軸：';
        } else if(mode === 'translation') {
            document.getElementById('mode-badge').innerText = '模式：平移練習';
            document.getElementById('mode-text').innerText = '請根據平移描述找出新坐標：';
        } else {
            document.getElementById('mode-badge').innerText = '模式：圖形讀取';
            document.getElementById('mode-text').innerText = '請觀察圖中點 $P$ 的位置與性質：';
        }
        
        generateQuestion();
    }

    function getRandomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function getCorrectLocation(x, y) {
        if (x > 0 && y > 0) return "第一象限";
        if (x < 0 && y > 0) return "第二象限";
        if (x < 0 && y < 0) return "第三象限";
        if (x > 0 && y < 0) return "第四象限";
        if (y === 0 && x !== 0) return "$x$ 軸";
        if (x === 0 && y !== 0) return "$y$ 軸";
        return "原點"; 
    }

    function generateQuestion() {
        if (questionCount >= 10) { showResult(); return; }
        questionCount++;
        document.getElementById('question-number').innerText = `第 ${questionCount} 題 / 共 10 題`;
        
        isFirstTrySteps = [true, true, true, true];
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('step1').style.display = 'block';
        document.getElementById('step2').style.display = 'none';
        document.getElementById('step3').style.display = 'none';
        document.getElementById('step4').style.display = 'none';
        document.getElementById('options1').innerHTML = '';
        document.getElementById('options2').innerHTML = '';
        document.getElementById('options3').innerHTML = '';
        document.getElementById('options4').innerHTML = '';
        
        if (p5Instance) { p5Instance.remove(); p5Instance = null; }

        if (quizMode === 'findCoordinate') {
            document.getElementById('step1-title').innerText = '請點擊點 $P$ 所在的位置：';
            do {
                curX = getRandomInt(-15, 15);
                curY = getRandomInt(-15, 15);
            } while (curX === 0 && curY === 0);
            document.getElementById('question-box').innerHTML = `$$ P(${curX}, ${curY}) $$`;
            setupOptionsMode1();
        } else if (quizMode === 'translation') {
            curX = getRandomInt(-10, 10);
            curY = getRandomInt(-10, 10);
            curK = getRandomInt(1, 10);
            const dirs = ['向上', '向下', '向左', '向右'];
            curDir = dirs[getRandomInt(0, 3)];
            document.getElementById('question-box').innerHTML = `將 $P(${curX}, ${curY})$ ${curDir} $${curK}$ 單位到達 $Q$ 點`;
            if (questionCount <= 5) setupMode2StepByStep();
            else setupMode2Direct();
        } else {
            // 模式三：圖形讀取
            do {
                curX = getRandomInt(-5, 5);
                curY = getRandomInt(-5, 5);
            } while (curX === 0 && curY === 0);
            document.getElementById('question-box').innerHTML = `請觀察圖中點 $P$ 的位置：`;
            document.getElementById('step1-title').innerText = 'Step 1: 請選擇正確的坐標：';
            initP5(); 
            setupOptionsMode3Step1();
        }
        
        MathJax.typesetPromise();
    }

    function initP5() {
        const sketch = (p) => {
            p.setup = () => {
                let cnv = p.createCanvas(300, 300);
                cnv.parent('canvas-holder');
            };
            p.draw = () => {
                p.background(255);
                let step = 25; 
                let originX = p.width / 2;
                let originY = p.height / 2;

                p.stroke(230);
                for(let i = -6; i <= 6; i++) {
                    p.line(0, originY + i*step, p.width, originY + i*step);
                    p.line(originX + i*step, 0, originX + i*step, p.height);
                }

                p.stroke(0); p.strokeWeight(2);
                p.line(0, originY, p.width, originY);
                p.line(originX, 0, originX, p.height);

                p.fill(0); p.noStroke();
                p.textAlign(p.CENTER, p.CENTER);
                p.text('x', p.width - 10, originY + 15);
                p.text('y', originX - 15, 10);
                
                p.textSize(9);
                for(let i = -5; i <= 5; i++) {
                    if(i===0) continue;
                    p.text(i, originX + i*step, originY + 12);
                    p.text(i, originX - 12, originY - i*step);
                }

                p.fill(255, 0, 0);
                p.ellipse(originX + curX*step, originY - curY*step, 10, 10);
                p.fill(255, 0, 0);
                p.textStyle(p.BOLD); p.textSize(14);
                p.text('P', originX + curX*step + 12, originY - curY*step - 12);
                p.noLoop();
            };
        };
        p5Instance = new p5(sketch);
    }

    // --- 模式三 選項 ---
    function setupOptionsMode3Step1() {
        const container = document.getElementById('options1');
        let correctVal = `(${curX}, ${curY})`;
        let options = new Set();
        options.add(correctVal);
        options.add(`(${curY}, ${curX})`);
        options.add(`(${-curX}, ${curY})`);
        options.add(`(${curX}, ${-curY})`);
        
        while(options.size < 4) {
            options.add(`(${getRandomInt(-5,5)}, ${getRandomInt(-5,5)})`);
        }

        Array.from(options).sort(() => Math.random() - 0.5).forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn'; btn.innerHTML = `$${opt}$`;
            btn.onclick = () => {
                if (opt === correctVal) {
                    btn.classList.add('correct');
                    if (isFirstTrySteps[0]) totalScore += 3;
                    container.querySelectorAll('.btn').forEach(b => b.disabled = true);
                    document.getElementById('step2').style.display = 'block';
                    setupOptionsMode3Step2();
                } else {
                    btn.classList.add('wrong');
                    isFirstTrySteps[0] = false;
                }
            };
            container.appendChild(btn);
        });
        MathJax.typesetPromise();
    }

    function setupOptionsMode3Step2() {
        const container = document.getElementById('options2');
        isStep2AskingX = Math.random() < 0.5;
        const targetAxis = isStep2AskingX ? "x 軸" : "y 軸";
        const correctDist = isStep2AskingX ? Math.abs(curY) : Math.abs(curX);
        
        document.getElementById('step2-title').innerText = `Step 2: 點 $P$ 到 $${targetAxis}$ 的距離是多少？`;
        
        // 選項邏輯: a, -a, b, -b (此處為距離，應皆為正值，題目要求邏輯結構為 a, -a, b, -b)
        let a = Math.abs(curX);
        let b = Math.abs(curY);
        let optionsSet = new Set([a, -a, b, -b]);
        
        while(optionsSet.size < 4) {
            optionsSet.add(getRandomInt(1, 10));
        }

        let options = Array.from(optionsSet).sort(() => Math.random() - 0.5);

        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn'; btn.innerHTML = `$${opt}$`;
            btn.onclick = () => {
                if (opt === correctDist) {
                    btn.classList.add('correct');
                    if (isFirstTrySteps[1]) totalScore += 3;
                    container.querySelectorAll('.btn').forEach(b => b.disabled = true);
                    document.getElementById('step3').style.display = 'block';
                    setupOptionsMode3Step3();
                } else {
                    btn.classList.add('wrong');
                    isFirstTrySteps[1] = false;
                }
            };
            container.appendChild(btn);
        });
        MathJax.typesetPromise();
    }

    function setupOptionsMode3Step3() {
        const container = document.getElementById('options3');
        const targetAxis = isStep2AskingX ? "y 軸" : "x 軸";
        const correctDist = isStep2AskingX ? Math.abs(curX) : Math.abs(curY);
        
        document.getElementById('step3-title').innerText = `Step 3: 點 $P$ 到 $${targetAxis}$ 的距離是多少？`;
        
        let a = Math.abs(curX);
        let b = Math.abs(curY);
        let optionsSet = new Set([a, -a, b, -b]);
        
        while(optionsSet.size < 4) {
            optionsSet.add(getRandomInt(1, 10));
        }

        let options = Array.from(optionsSet).sort(() => Math.random() - 0.5);

        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn'; btn.innerHTML = `$${opt}$`;
            btn.onclick = () => {
                if (opt === correctDist) {
                    btn.classList.add('correct');
                    if (isFirstTrySteps[2]) totalScore += 3;
                    if (isFirstTrySteps[0] && isFirstTrySteps[1] && isFirstTrySteps[2]) {
                        totalScore += 1;
                    }
                    container.querySelectorAll('.btn').forEach(b => b.disabled = true);
                    document.getElementById('next-btn').style.display = 'block';
                } else {
                    btn.classList.add('wrong');
                    isFirstTrySteps[2] = false;
                }
            };
            container.appendChild(btn);
        });
        MathJax.typesetPromise();
    }

    // --- 模式一 ---
    function setupOptionsMode1() {
        const allOptions = ["第二象限", "第一象限", "第三象限", "第四象限", "$x$ 軸", "$y$ 軸"];
        const correct = getCorrectLocation(curX, curY);
        const container = document.getElementById('options1');
        allOptions.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn'; btn.innerHTML = opt;
            btn.onclick = () => {
                if (opt === correct) {
                    btn.classList.add('correct');
                    if (isFirstTrySteps[0]) totalScore += 10;
                    container.querySelectorAll('.btn').forEach(b => b.disabled = true);
                    document.getElementById('next-btn').style.display = 'block';
                } else { btn.classList.add('wrong'); isFirstTrySteps[0] = false; }
            };
            container.appendChild(btn);
        });
    }

    // --- 模式二 ---
    function setupMode2StepByStep() {
        const c1 = document.getElementById('options1');
        document.getElementById('step1-title').innerText = `Step 1: 「${curDir}」平移會影響哪一個坐標？`;
        const correctStep1 = (curDir === '向上' || curDir === '向下') ? '$y$ 坐標' : '$x$ 坐標';
        ['$x$ 坐標', '$y$ 坐標'].forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn'; btn.innerHTML = opt;
            btn.onclick = () => {
                if(opt === correctStep1) {
                    btn.classList.add('correct');
                    if(isFirstTrySteps[0]) totalScore += 3;
                    c1.querySelectorAll('.btn').forEach(b => b.disabled = true);
                    document.getElementById('step2').style.display = 'block';
                    setupMode2Step2();
                } else { btn.classList.add('wrong'); isFirstTrySteps[0] = false; }
            };
            c1.appendChild(btn);
        });
    }

    function setupMode2Step2() {
        const c2 = document.getElementById('options2');
        document.getElementById('step2-title').innerText = `Step 2: 「${curDir}」平移 $${curK}$ 單位，該坐標應該？`;
        const isPlus = (curDir === '向上' || curDir === '向右');
        const realCorrect = isPlus ? `加 $${curK}$` : `減 $${curK}$`;

        [`加 $${curK}$`, `減 $${curK}$`].forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn'; btn.innerHTML = opt;
            btn.onclick = () => {
                if(opt === realCorrect) {
                    btn.classList.add('correct');
                    if(isFirstTrySteps[1]) totalScore += 3;
                    c2.querySelectorAll('.btn').forEach(b => b.disabled = true);
                    document.getElementById('step3').style.display = 'block';
                    setupMode2Step3();
                } else { btn.classList.add('wrong'); isFirstTrySteps[1] = false; }
            };
            c2.appendChild(btn);
        });
        MathJax.typesetPromise();
    }

    function setupMode2Step3() {
        const c3 = document.getElementById('options3');
        document.getElementById('step3-title').innerText = `Step 3: 選出正確的算式：`;
        let correctFormula = (curDir==='向上') ? `(${curX}, ${curY}+${curK})` : (curDir==='向下') ? `(${curX}, ${curY}-${curK})` : (curDir==='向左') ? `(${curX}-${curK}, ${curY})` : `(${curX}+${curK}, ${curY})`;
        const formulas = [`(${curX}+${curK}, ${curY})`, `(${curX}-${curK}, ${curY})`, `(${curX}, ${curY}+${curK})`, `(${curX}, ${curY}-${curK})`].sort(() => Math.random() - 0.5);
        formulas.forEach(form => {
            const btn = document.createElement('button');
            btn.className = 'btn'; btn.innerHTML = `$${form}$`;
            btn.onclick = () => {
                if(form === correctFormula) {
                    btn.classList.add('correct');
                    if(isFirstTrySteps[2]) totalScore += 3;
                    c3.querySelectorAll('.btn').forEach(b => b.disabled = true);
                    document.getElementById('step4').style.display = 'block';
                    setupMode2Step4();
                } else { btn.classList.add('wrong'); isFirstTrySteps[2] = false; }
            };
            c3.appendChild(btn);
        });
        MathJax.typesetPromise();
    }

    function setupMode2Step4() {
        const c4 = document.getElementById('options4');
        document.getElementById('step4-title').innerText = `Step 4: 計算出 $Q$ 點最終坐標：`;
        let finalQ = (curDir==='向上') ? `(${curX}, ${curY + curK})` : (curDir==='向下') ? `(${curX}, ${curY - curK})` : (curDir==='向左') ? `(${curX - curK}, ${curY})` : `(${curX + curK}, ${curY})`;
        createFinalOptions(finalQ).forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn'; btn.innerHTML = `$${opt}$`;
            btn.onclick = () => {
                if(opt === finalQ) {
                    btn.classList.add('correct');
                    if(isFirstTrySteps[3]) totalScore += 3;
                    if(isFirstTrySteps[0] && isFirstTrySteps[1] && isFirstTrySteps[2] && isFirstTrySteps[3]) totalScore += 1;
                    
                    c4.querySelectorAll('.btn').forEach(b => b.disabled = true);
                    document.getElementById('next-btn').style.display = 'block';
                } else { btn.classList.add('wrong'); isFirstTrySteps[3] = false; }
            };
            c4.appendChild(btn);
        });
        MathJax.typesetPromise();
    }

    function setupMode2Direct() {
        const c1 = document.getElementById('options1');
        document.getElementById('step1-title').innerText = 'Step 1: 下列哪一個算式可以求出 $Q$ 點坐標?';
        document.getElementById('step2-title').innerText = 'Step 2: 所以，$Q$ 點坐標是多少?';
        let correctFormula = (curDir==='向上') ? `(${curX}, ${curY}+${curK})` : (curDir==='向下') ? `(${curX}, ${curY}-${curK})` : (curDir==='向左') ? `(${curX}-${curK}, ${curY})` : `(${curX}+${curK}, ${curY})`;
        let finalQ = (curDir==='向上') ? `(${curX}, ${curY + curK})` : (curDir==='向下') ? `(${curX}, ${curY - curK})` : (curDir==='向左') ? `(${curX - curK}, ${curY})` : `(${curX + curK}, ${curY})`;
        [`(${curX}+${curK}, ${curY})`, `(${curX}-${curK}, ${curY})`, `(${curX}, ${curY}+${curK})`, `(${curX}, ${curY}-${curK})`].sort(()=>Math.random()-0.5).forEach(form => {
            const btn = document.createElement('button');
            btn.className = 'btn'; btn.innerHTML = `$${form}$`;
            btn.onclick = () => {
                if (form === correctFormula) {
                    btn.classList.add('correct');
                    if (isFirstTrySteps[0]) totalScore += 5;
                    c1.querySelectorAll('.btn').forEach(b => b.disabled = true);
                    document.getElementById('step2').style.display = 'block';
                    setupStep2Direct(finalQ);
                } else { btn.classList.add('wrong'); isFirstTrySteps[0] = false; }
            };
            c1.appendChild(btn);
        });
    }

    function setupStep2Direct(correctVal) {
        const c2 = document.getElementById('options2');
        createFinalOptions(correctVal).forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn'; btn.innerHTML = `$${opt}$`;
            btn.onclick = () => {
                if (opt === correctVal) {
                    btn.classList.add('correct');
                    if (isFirstTrySteps[1]) totalScore += 4;
                    if (isFirstTrySteps[0] && isFirstTrySteps[1]) totalScore += 1;
                    c2.querySelectorAll('.btn').forEach(b => b.disabled = true);
                    document.getElementById('next-btn').style.display = 'block';
                } else { btn.classList.add('wrong'); isFirstTrySteps[1] = false; }
            };
            c2.appendChild(btn);
        });
        MathJax.typesetPromise();
    }

    function createFinalOptions(correctVal) {
        let options = new Set();
        options.add(correctVal);
        if (curDir === '向左' || curDir === '向右') {
            options.add(`(${curX + curK}, ${curY})`); options.add(`(${curX - curK}, ${curY})`);
        } else {
            options.add(`(${curX}, ${curY + curK})`); options.add(`(${curX}, ${curY - curK})`);
        }
        while(options.size < 4) {
            options.add(`(${getRandomInt(-15,15)}, ${getRandomInt(-15,15)})`);
        }
        return Array.from(options).slice(0, 4).sort(() => Math.random() - 0.5);
    }

    function showResult() {
        if (p5Instance) { p5Instance.remove(); p5Instance = null; }
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = totalScore + " 分";
    }

    function resetQuiz() {
        if (p5Instance) { p5Instance.remove(); p5Instance = null; }
        questionCount = 0; totalScore = 0;
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('start-screen').style.display = 'block';
    }

    window.onload = function() {
        new QRCode(document.getElementById("qrcode"), {
            text: window.location.href,
            width: 128, height: 128
        });
    };
</script>

</body>
