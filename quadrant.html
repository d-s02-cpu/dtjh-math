<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>苗栗大同國中資源中心 - 直角坐標練習</title>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script type="text/javascript" id="MathJax-script" async
        src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #4caf50; 
            --accent-color: #ff9800;
            --success-color: #4caf50;
            --error-color: #f44336;
            --bg-color: #f5f7fa;
            --step-bg: #fffbe6;
        }
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }
        .container {
            background: white; padding: 2rem; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%; max-width: 550px; text-align: center;
        }
        .question-text { font-size: 1.1rem; color: #555; margin-bottom: 0.5rem; text-align: left; }
        #question-box {
            font-size: 1.8rem; margin: 0.5rem 0 1.5rem 0; padding: 1rem;
            background: #f8f9fa; border-radius: 12px; border: 1px solid #eee;
        }
        .step-container {
            margin-top: 1rem; padding: 1rem; border-radius: 15px;
            background: var(--step-bg); border: 1px dashed #ffe58f;
            display: none; 
        }
        .step-title { font-weight: bold; margin-bottom: 10px; color: #856404; display: block; }
        
        /* 核心修改：固定 2x3 網格配置 */
        .options-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
        }
        
        .btn {
            padding: 1rem; font-size: 1.1rem; border: 2px solid var(--primary-color);
            background: white; border-radius: 10px; cursor: pointer; transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:disabled { cursor: not-allowed; opacity: 0.8; }
        .correct { background: var(--success-color) !important; color: white; border-color: var(--success-color); }
        .wrong { background: var(--error-color) !important; color: white; border-color: var(--error-color); }
        #next-btn {
            margin-top: 1.5rem; padding: 1rem; background: var(--primary-color);
            color: white; border: none; border-radius: 50px; font-size: 1.1rem;
            display: none; width: 100%; cursor: pointer;
        }
        .feedback-text { color: var(--error-color); font-weight: bold; margin-bottom: 10px; min-height: 1.2rem; }
        #quiz-status { display: flex; justify-content: space-between; margin-bottom: 1rem; color: #666; font-weight: bold; align-items: center; }
        .mode-badge { font-size: 0.85rem; padding: 4px 12px; border-radius: 20px; background: #eee; color: #555; }
        
        #start-screen, #quiz-container, #result-screen { display: none; }
        #start-screen { display: block; } 
        
        .score-display { font-size: 3rem; color: var(--primary-color); margin: 1rem 0; }
        .desc-text { color: #666; margin-bottom: 1.5rem; line-height: 1.6; }

        #qrcode-container {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        #qrcode {
            padding: 10px;
            background: white;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>

<div class="container" id="start-screen">
    <h2>苗栗大同國中資源中心</h2>
    <h3>直角坐標平面循序練習</h3>
    <div class="desc-text">
        請選擇練習題型：<br>
        認識坐標點 $P(x, y)$ 的位置。
    </div>
    <div style="display: flex; flex-direction: column; gap: 15px;">
        <button class="btn" style="background: var(--primary-color); color: white; border-color: var(--primary-color);" onclick="startQuiz('findCoordinate')">模式一：判斷點 $P$ 在哪裡</button>
    </div>
    
    <div id="qrcode-container">
        <div id="qrcode"></div>
        <span style="font-size: 0.8rem; color: #888;">掃描 QR Code 分享練習</span>
    </div>
</div>

<div class="container" id="quiz-container">
    <div id="quiz-status">
        <span id="question-number">第 1 題 / 共 10 題</span>
        <span id="mode-badge" class="mode-badge">練習模式</span>
    </div>

    <div class="question-text" id="mode-text">題目載入中...</div>
    <div id="question-box"></div>

    <div id="step1" class="step-container" style="display: block;">
        <span class="step-title" id="step1-title">請點擊點 $P$ 所在的位置：</span>
        <div id="q1-feedback" class="feedback-text"></div>
        <div class="options-grid" id="options1">
            </div>
    </div>

    <button id="next-btn" onclick="generateQuestion()">下一題</button>
</div>

<div class="container" id="result-screen">
    <h2>練習完成！</h2>
    <div class="score-display" id="final-score">0</div>
    <p>測驗結束，表現優異！</p>
    <button class="btn" style="width: 100%; background: var(--primary-color); color: white;" onclick="resetQuiz()">回主選單</button>
</div>

<script>
    let quizMode = 'findCoordinate';
    let curX = 0, curY = 0;
    let questionCount = 0;
    let totalScore = 0;
    let isFirstTry = true;

    function startQuiz(mode) {
        quizMode = mode;
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-container').style.display = 'block';
        
        document.getElementById('mode-badge').innerText = '模式：位置判斷';
        document.getElementById('mode-text').innerText = '請判斷點 $P$ 所在的象限或坐標軸：';
        
        generateQuestion();
    }

    function getRandomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function getCorrectLocation(x, y) {
        if (x > 0 && y > 0) return "第一象限";
        if (x < 0 && y > 0) return "第二象限";
        if (x < 0 && y < 0) return "第三象限";
        if (x > 0 && y < 0) return "第四象限";
        if (y === 0 && x !== 0) return "$x$ 軸";
        if (x === 0 && y !== 0) return "$y$ 軸";
        return "原點"; 
    }

    function generateQuestion() {
        if (questionCount >= 10) { showResult(); return; }
        questionCount++;
        document.getElementById('question-number').innerText = `第 ${questionCount} 題 / 共 10 題`;
        isFirstTry = true;

        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('options1').innerHTML = '';
        document.getElementById('q1-feedback').innerText = '';

        do {
            curX = getRandomInt(-15, 15);
            curY = getRandomInt(-15, 15);
        } while (curX === 0 && curY === 0);

        document.getElementById('question-box').innerHTML = `$$ P(${curX}, ${curY}) $$`;
        
        setupOptions();
        MathJax.typesetPromise();
    }

    function setupOptions() {
        // 固定順序以達成潛意識訓練：左上(二)、右上(一)、左下(三)、右下(四)、最下左(x軸)、最下右(y軸)
        const allOptions = ["第二象限", "第一象限", "第三象限", "第四象限", "$x$ 軸", "$y$ 軸"];
        const correct = getCorrectLocation(curX, curY);
        const container = document.getElementById('options1');

        allOptions.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerHTML = opt;
            btn.onclick = () => {
                if (opt === correct) {
                    btn.classList.add('correct');
                    if (isFirstTry) totalScore += 10;
                    container.querySelectorAll('.btn').forEach(b => b.disabled = true);
                    document.getElementById('next-btn').style.display = 'block';
                } else {
                    btn.classList.add('wrong');
                    isFirstTry = false;
                }
            };
            container.appendChild(btn);
        });
    }

    function showResult() {
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = totalScore + " 分";
    }

    function resetQuiz() {
        questionCount = 0; totalScore = 0;
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('start-screen').style.display = 'block';
    }

    window.onload = function() {
        new QRCode(document.getElementById("qrcode"), {
            text: window.location.href,
            width: 128, height: 128
        });
    };
</script>

</body>
</html>
