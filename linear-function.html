<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>線型函數引導練習系統 - 苗栗大同國中資源中心</title>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script type="text/javascript" id="MathJax-script" async
        src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #4caf50; 
            --success-color: #4caf50;
            --error-color: #f44336;
            --bg-color: #f5f7fa;
            --step-bg: #fffbe6;
        }
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }
        .container {
            background: white; padding: 2rem; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%; max-width: 550px; text-align: center;
        }
        .question-text { font-size: 1.1rem; color: #555; margin-bottom: 0.5rem; text-align: left; }
        #question-box {
            font-size: 1.6rem; margin: 0.5rem 0 1.5rem 0; padding: 1rem;
            background: #f8f9fa; border-radius: 12px; border: 1px solid #eee;
            line-height: 1.5;
        }
        /* p5 畫布容器 */
        #canvas-container {
            display: flex; justify-content: center; margin-bottom: 1rem;
            background: #fff; border-radius: 10px; overflow: hidden;
        }
        .step-container {
            margin-top: 1rem; padding: 1rem; border-radius: 15px;
            background: var(--step-bg); border: 1px dashed #ffe58f;
            display: none; 
        }
        .step-title { font-weight: bold; margin-bottom: 10px; color: #856404; display: block; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn {
            padding: 1rem; font-size: 1.1rem; border: 2px solid var(--primary-color);
            background: white; border-radius: 10px; cursor: pointer; transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:disabled { cursor: not-allowed; opacity: 0.8; }
        .correct { background: var(--success-color) !important; color: white; border-color: var(--success-color); }
        .wrong { background: var(--error-color) !important; color: white; border-color: var(--error-color); }
        #next-btn {
            margin-top: 1.5rem; padding: 1rem; background: var(--primary-color);
            color: white; border: none; border-radius: 50px; font-size: 1.1rem;
            display: none; width: 100%; cursor: pointer;
        }
        .feedback-text { color: var(--error-color); font-weight: bold; margin-bottom: 10px; min-height: 1.2rem; }
        #quiz-status { display: flex; justify-content: space-between; margin-bottom: 1rem; color: #666; font-weight: bold; align-items: center; }
        .mode-badge { font-size: 0.85rem; padding: 4px 12px; border-radius: 20px; background: #eee; color: #555; }
        
        #start-screen, #quiz-container, #result-screen { display: none; }
        #start-screen { display: block; } 
        
        .score-display { font-size: 3rem; color: var(--primary-color); margin: 1rem 0; }
        .desc-text { color: #666; margin-bottom: 1.5rem; line-height: 1.6; }

        #qrcode-container {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        #qrcode {
            padding: 10px;
            background: white;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>

<div class="container" id="start-screen">
    <h2>苗栗大同國中資源中心</h2>
    <h3 id="quiz-title">線型函數引導練習系統</h3>
    <div class="desc-text" id="quiz-desc">
        請選擇練習模式：
    </div>
    <div style="display: flex; flex-direction: column; gap: 15px;">
        <button class="btn" style="background: var(--primary-color); color: white; border-color: var(--primary-color);" onclick="startQuiz('mode1')">模式一：求函數值</button>
        <button class="btn" style="background: var(--secondary-color); color: white; border-color: var(--secondary-color);" onclick="startQuiz('mode2')">模式二：辨識函數圖形</button>
    </div>
    
    <div id="qrcode-container">
        <div id="qrcode"></div>
        <span style="font-size: 0.8rem; color: #888;">掃描 QR Code 分享練習</span>
    </div>
</div>

<div class="container" id="quiz-container">
    <div id="quiz-status">
        <span id="question-number">第 1 題 / 共 10 題</span>
        <span id="mode-badge" class="mode-badge">練習模式</span>
    </div>

    <div class="question-text" id="mode-text"></div>
    <div id="canvas-container"></div>
    <div id="question-box"></div>

    <div id="step1" class="step-container" style="display: block;">
        <span class="step-title" id="step1-title">Step 1. 觀察圖形判斷</span>
        <div id="q1-feedback" class="feedback-text"></div>
        <div class="options-grid" id="options1"></div>
    </div>

    <div id="step2" class="step-container">
        <span class="step-title" id="step2-hint">Step 2.</span>
        <div id="q2-feedback" class="feedback-text"></div>
        <div class="options-grid" id="options2"></div>
    </div>

    <div id="step3" class="step-container">
        <span class="step-title" id="step3-hint">Step 3.</span>
        <div id="q3-feedback" class="feedback-text"></div>
        <div class="options-grid" id="options3"></div>
    </div>

    <div id="step4" class="step-container">
        <span class="step-title" id="step4-hint">Step 4.</span>
        <div id="q4-feedback" class="feedback-text"></div>
        <div class="options-grid" id="options4"></div>
    </div>

    <button id="next-btn" onclick="generateQuestion()">下一題</button>
</div>

<div class="container" id="result-screen">
    <h2>練習完成！</h2>
    <div class="score-display" id="final-score">0</div>
    <p>滿分 100 分，測驗結束。</p>
    <button class="btn" style="width: 100%; background: var(--primary-color); color: white;" onclick="resetQuiz()">回主選單</button>
</div>

<script>
    let quizMode = '';
    let questionCount = 0;
    let totalScore = 0;
    let currentQ = {};
    let isFirstTryQ1 = true, isFirstTryQ2 = true, isFirstTryQ3 = true, isFirstTryQ4 = true;
    let p5Instance = null;

    function formatNum(num, isLeading = false) {
        if (num < 0 && !isLeading) return `(${num})`;
        return num.toString();
    }

    function startQuiz(mode) {
        quizMode = mode;
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-container').style.display = 'block';
        document.getElementById('mode-badge').innerText = mode === 'mode1' ? "求函數值" : "辨識圖形";
        generateQuestion();
    }

    function getRandomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    const sketch = (p) => {
        p.setup = () => {
            let canvas = p.createCanvas(300, 300);
            canvas.parent('canvas-container');
        };

        p.draw = () => {
            p.background(255);
            p.translate(p.width/2, p.height/2);
            p.stroke(200);
            p.line(-p.width/2, 0, p.width/2, 0);
            p.line(0, -p.height/2, 0, p.height/2);
            p.stroke(74, 144, 226);
            p.strokeWeight(3);
            let scale = 20; 
            let x1 = -10, x2 = 10;
            let y1 = currentQ.a * x1 + currentQ.b;
            let y2 = currentQ.a * x2 + currentQ.b;
            p.line(x1 * scale, -y1 * scale, x2 * scale, -y2 * scale);
            p.fill(0);
            p.noStroke();
            p.textSize(12);
            p.text("O", 5, 15);
        };
    };

    function generateQuestion() {
        if (questionCount >= 10) {
            showResult();
            return;
        }

        questionCount++;
        document.getElementById('question-number').innerText = `第 ${questionCount} 題 / 共 10 題`;
        resetStepUI();

        if (quizMode === 'mode1') {
            document.getElementById('canvas-container').style.display = 'none';
            let a = 0; while(a === 0) a = getRandomInt(-9, 9);
            let b = getRandomInt(-15, 15);
            let x = getRandomInt(-9, 9);
            currentQ = { a, b, x, am: a * x, y: a * x + b };
            let aDisplay = a === 1 ? "" : (a === -1 ? "-" : a);
            let bStr = b === 0 ? "" : (b > 0 ? `+ ${b}` : `- ${Math.abs(b)}`);
            document.getElementById('question-box').innerHTML = `已知線型函數 $y = ${aDisplay}x ${bStr}$，當 $x = ${x}$ 時，其函數值是多少？`;
            setupStep1();
        } else {
            document.getElementById('canvas-container').style.display = 'flex';
            let isConstant = Math.random() > 0.5;
            let a = isConstant ? 0 : (Math.random() > 0.5 ? getRandomInt(1, 3) : getRandomInt(-3, -1));
            let b = getRandomInt(-5, 5);
            currentQ = { a, b, type: isConstant ? "常數函數" : "一次函數" };
            document.getElementById('question-box').innerHTML = `觀察下方的圖形，判斷其特徵與函數種類。`;
            if (!p5Instance) {
                p5Instance = new p5(sketch);
            }
            setupStep1Mode2();
        }
        
        if (window.MathJax) MathJax.typeset();
    }

    function setupStep1() {
        document.getElementById('step1-title').innerText = "Step 1. 將 $x$ 代入算式";
        let bSign = currentQ.b >= 0 ? '+' : '-';
        let bAbs = Math.abs(currentQ.b);
        let correct = `${currentQ.a} \\times ${formatNum(currentQ.x)} ${bSign} ${bAbs}`;
        let wrong1 = `${currentQ.a} + ${formatNum(currentQ.x)} ${bSign} ${bAbs}`; 
        let options = shuffleArray([correct, wrong1, `${currentQ.a} \\times x ${bSign} ${bAbs}`, `${currentQ.a} \\times ${currentQ.x + 1} ${bSign} ${bAbs}`]);
        renderOptions(1, options, correct, () => {
            if(isFirstTryQ1) totalScore += 2;
            document.getElementById('step2').style.display = 'block';
            setupStep2();
        }, "", {wrong1: "運算符號錯誤", default: "代入過程有誤"});
    }

    function setupStep2() {
        let correct = currentQ.am;
        let options = shuffleArray([correct, -currentQ.am, currentQ.a + currentQ.x, currentQ.am + 1]);
        renderOptions(2, options, correct, () => {
            if(isFirstTryQ2) totalScore += 2;
            document.getElementById('step3').style.display = 'block';
            setupStep3();
        }, `請問 $${currentQ.a} \\times ${formatNum(currentQ.x)}$ 的結果是？`, {wrong1: "請注意正負號", default: "乘法計算有誤"});
    }

    function setupStep3() {
        let correct = currentQ.y;
        let options = shuffleArray([correct, currentQ.am - currentQ.b, currentQ.am + currentQ.b + 1, currentQ.am]);
        let opText = currentQ.b >= 0 ? '+' : '-';
        renderOptions(3, options, correct, () => {
            if(isFirstTryQ3) totalScore += 2;
            document.getElementById('step4').style.display = 'block';
            setupStep4();
        }, `最後計算 $${currentQ.am} ${opText} ${Math.abs(currentQ.b)} = ?$`, {default: "最後計算有誤"});
    }

    function setupStep4() {
        let correct = `(${currentQ.x}, ${currentQ.y})`;
        let options = shuffleArray([correct, `(${currentQ.y}, ${currentQ.x})`, `(${currentQ.a}, ${currentQ.b})`, `(${currentQ.x}, 0)`]);
        renderOptions(4, options, correct, () => {
            if(isFirstTryQ4) totalScore += 2;
            if(isFirstTryQ1 && isFirstTryQ2 && isFirstTryQ3 && isFirstTryQ4) totalScore += 2;
            document.getElementById('next-btn').style.display = 'block';
        }, `此函數圖形會通過坐標平面上哪一點？`, {wrong1: "座標順序為 (x, y)", default: "座標概念有誤"});
    }

    function setupStep1Mode2() {
        document.getElementById('step1-title').innerText = "Step 1. 觀察圖形的特徵";
        let correct = currentQ.a === 0 ? "圖形是一條水平線" : "圖形是一條斜直線";
        let wrong = currentQ.a === 0 ? "圖形是一條斜直線" : "圖形是一條水平線";
        let options = shuffleArray([correct, wrong]);
        renderOptions(1, options, correct, () => {
            if(isFirstTryQ1) totalScore += 5;
            document.getElementById('step2').style.display = 'block';
            setupStep2Mode2();
        }, "", {default: "請再觀察圖形的傾斜狀態"});
    }

    function setupStep2Mode2() {
        document.getElementById('step2-hint').innerText = "Step 2. 判斷此線型函數的種類";
        let correct = currentQ.type;
        let options = ["一次函數", "常數函數"];
        renderOptions(2, options, correct, () => {
            if(isFirstTryQ2) totalScore += 5;
            document.getElementById('next-btn').style.display = 'block';
        }, "根據特徵，這是哪一種函數？", {default: "常數函數的圖形必定是水平線喔！"});
    }

    function renderOptions(stepNum, options, correct, nextStep, hintText = "", feedbackMap = {}) {
        const container = document.getElementById(`options${stepNum}`);
        if(hintText) document.getElementById(`step${stepNum}-hint`).innerHTML = hintText;
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerHTML = (quizMode === 'mode2') ? opt : `$${opt}$`; 
            btn.onclick = () => {
                if (String(opt) === String(correct)) {
                    btn.classList.add('correct');
                    disableAllInStep(stepNum);
                    document.getElementById(`q${stepNum}-feedback`).style.color = "var(--success-color)";
                    document.getElementById(`q${stepNum}-feedback`).innerText = "正確！";
                    nextStep();
                } else {
                    btn.classList.add('wrong');
                    let msg = feedbackMap.default || "再試一次";
                    document.getElementById(`q${stepNum}-feedback`).style.color = "var(--error-color)";
                    document.getElementById(`q${stepNum}-feedback`).innerText = msg;
                    markError(stepNum);
                }
            };
            container.appendChild(btn);
        });
        if (window.MathJax) MathJax.typeset();
    }

    function markError(num) {
        if(num === 1) isFirstTryQ1 = false;
        if(num === 2) isFirstTryQ2 = false;
        if(num === 3) isFirstTryQ3 = false;
        if(num === 4) isFirstTryQ4 = false;
    }

    function disableAllInStep(num) {
        const btns = document.getElementById(`options${num}`).querySelectorAll('.btn');
        btns.forEach(b => b.disabled = true);
    }

    function resetStepUI() {
        isFirstTryQ1 = isFirstTryQ2 = isFirstTryQ3 = isFirstTryQ4 = true;
        for(let i=2; i<=4; i++) {
            document.getElementById(`step${i}`).style.display = 'none';
        }
        document.getElementById('next-btn').style.display = 'none';
        ['1','2','3','4'].forEach(num => {
            document.getElementById(`options${num}`).innerHTML = '';
            document.getElementById(`q${num}-feedback`).innerText = '';
        });
    }

    function showResult() {
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = totalScore + " 分";
    }

    function resetQuiz() {
        questionCount = 0;
        totalScore = 0;
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('start-screen').style.display = 'block';
    }

    window.onload = function() {
        new QRCode(document.getElementById("qrcode"), {
            text: window.location.href,
            width: 128,
            height: 128
        });
    };
</script>

</body>
</html>
