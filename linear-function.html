<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>苗栗大同國中資源中心 - 互動練習</title>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script type="text/javascript" id="MathJax-script" async
        src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #4caf50; 
            --success-color: #4caf50;
            --error-color: #f44336;
            --bg-color: #f5f7fa;
            --step-bg: #fffbe6;
        }
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }
        .container {
            background: white; padding: 2rem; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%; max-width: 550px; text-align: center;
        }
        .question-text { font-size: 1.1rem; color: #555; margin-bottom: 0.5rem; text-align: left; }
        #question-box {
            font-size: 1.6rem; margin: 0.5rem 0 1.5rem 0; padding: 1rem;
            background: #f8f9fa; border-radius: 12px; border: 1px solid #eee;
            line-height: 1.5;
        }
        .step-container {
            margin-top: 1rem; padding: 1rem; border-radius: 15px;
            background: var(--step-bg); border: 1px dashed #ffe58f;
            display: none; 
        }
        .step-title { font-weight: bold; margin-bottom: 10px; color: #856404; display: block; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn {
            padding: 1rem; font-size: 1.1rem; border: 2px solid var(--primary-color);
            background: white; border-radius: 10px; cursor: pointer; transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:disabled { cursor: not-allowed; opacity: 0.8; }
        .correct { background: var(--success-color) !important; color: white; border-color: var(--success-color); }
        .wrong { background: var(--error-color) !important; color: white; border-color: var(--error-color); }
        #next-btn {
            margin-top: 1.5rem; padding: 1rem; background: var(--primary-color);
            color: white; border: none; border-radius: 50px; font-size: 1.1rem;
            display: none; width: 100%; cursor: pointer;
        }
        .feedback-text { color: var(--error-color); font-weight: bold; margin-bottom: 10px; min-height: 1.2rem; }
        #quiz-status { display: flex; justify-content: space-between; margin-bottom: 1rem; color: #666; font-weight: bold; align-items: center; }
        .mode-badge { font-size: 0.85rem; padding: 4px 12px; border-radius: 20px; background: #eee; color: #555; }
        
        #start-screen, #quiz-container, #result-screen { display: none; }
        #start-screen { display: block; } 
        
        .score-display { font-size: 3rem; color: var(--primary-color); margin: 1rem 0; }
        .desc-text { color: #666; margin-bottom: 1.5rem; line-height: 1.6; }

        #qrcode-container {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        #qrcode {
            padding: 10px;
            background: white;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>

<div class="container" id="start-screen">
    <h2>苗栗大同國中資源中心</h2>
    <h3 id="quiz-title">線型函數練習</h3>
    <div class="desc-text" id="quiz-desc">
        請選擇練習模式：
    </div>
    <div style="display: flex; flex-direction: column; gap: 15px;">
        <button class="btn" style="background: var(--primary-color); color: white; border-color: var(--primary-color);" onclick="startQuiz('mode1')">模式一：求函數值</button>
        <button class="btn" style="background: var(--secondary-color); color: white; border-color: var(--secondary-color);" onclick="startQuiz('mode2')">模式二：待開發</button>
    </div>
    
    <div id="qrcode-container">
        <div id="qrcode"></div>
        <span style="font-size: 0.8rem; color: #888;">掃描 QR Code 分享練習</span>
    </div>
</div>

<div class="container" id="quiz-container">
    <div id="quiz-status">
        <span id="question-number">第 1 題 / 共 10 題</span>
        <span id="mode-badge" class="mode-badge">練習模式</span>
    </div>

    <div class="question-text" id="mode-text"></div>
    <div id="question-box"></div>

    <div id="step1" class="step-container" style="display: block;">
        <span class="step-title" id="step1-title">Step 1. 將 $x$ 代入算式</span>
        <div id="q1-feedback" class="feedback-text"></div>
        <div class="options-grid" id="options1"></div>
    </div>

    <div id="step2" class="step-container">
        <span class="step-title" id="step2-hint">Step 2. 計算乘法部分</span>
        <div id="q2-feedback" class="feedback-text"></div>
        <div class="options-grid" id="options2"></div>
    </div>

    <div id="step3" class="step-container">
        <span class="step-title" id="step3-hint">Step 3. 得到最終結果</span>
        <div id="q3-feedback" class="feedback-text"></div>
        <div class="options-grid" id="options3"></div>
    </div>

    <div id="step4" class="step-container">
        <span class="step-title" id="step4-hint">Step 4. 座標幾何意義</span>
        <div id="q4-feedback" class="feedback-text"></div>
        <div class="options-grid" id="options4"></div>
    </div>

    <button id="next-btn" onclick="generateQuestion()">下一題</button>
</div>

<div class="container" id="result-screen">
    <h2>練習完成！</h2>
    <div class="score-display" id="final-score">0</div>
    <p>滿分 100 分，測驗結束。</p>
    <button class="btn" style="width: 100%; background: var(--primary-color); color: white;" onclick="resetQuiz()">回主選單</button>
</div>

<script>
    let quizMode = '';
    let questionCount = 0;
    let totalScore = 0;
    let currentQ = {};
    let isFirstTryQ1 = true, isFirstTryQ2 = true, isFirstTryQ3 = true, isFirstTryQ4 = true;

    function formatNum(num, isLeading = false) {
        if (num < 0 && !isLeading) return `(${num})`;
        return num.toString();
    }

    function startQuiz(mode) {
        quizMode = mode;
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-container').style.display = 'block';
        document.getElementById('mode-badge').innerText = mode === 'mode1' ? "求函數值" : "模式二";
        generateQuestion();
    }

    function getRandomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function generateQuestion() {
        if (questionCount >= 10) {
            showResult();
            return;
        }

        questionCount++;
        document.getElementById('question-number').innerText = `第 ${questionCount} 題 / 共 10 題`;
        resetStepUI();

        let a = 0; while(a === 0) a = getRandomInt(-9, 9);
        let b = getRandomInt(-15, 15);
        let x = getRandomInt(-9, 9);
        currentQ = { a, b, x, am: a * x, y: a * x + b };

        let aDisplay = a === 1 ? "" : (a === -1 ? "-" : a);
        let bStr = b === 0 ? "" : (b > 0 ? `+ ${b}` : `- ${Math.abs(b)}`);
        
        document.getElementById('mode-text').innerText = ``;
        document.getElementById('question-box').innerHTML = 
            `已知線型函數 $y = ${aDisplay}x ${bStr}$，當 $x = ${x}$ 時，其函數值是多少？`;
        
        if (window.MathJax) MathJax.typeset();
        setupStep1();
    }

    function setupStep1() {
        let bSign = currentQ.b >= 0 ? '+' : '-';
        let bAbs = Math.abs(currentQ.b);
        let correct = `${currentQ.a} \\times ${formatNum(currentQ.x)} ${bSign} ${bAbs}`;
        
        let wrong1 = `${currentQ.a} + ${formatNum(currentQ.x)} ${bSign} ${bAbs}`; 
        let wrong2 = `${currentQ.a} \\times x ${bSign} ${bAbs}`; 
        let wrong3 = `${currentQ.a} \\times ${formatNum(currentQ.x + getRandomInt(1,2))} ${bSign} ${bAbs}`; 

        let options = shuffleArray(Array.from(new Set([correct, wrong1, wrong2, wrong3])));
        while(options.length < 4) options.push(`${currentQ.a} \\times ${currentQ.x - 1} ${bSign} ${bAbs}`);

        renderOptions(1, options, correct, () => {
            if(isFirstTryQ1) totalScore += 2; // 步驟分
            document.getElementById('step2').style.display = 'block';
            setupStep2();
        }, "", {wrong1: "運算符號錯誤", wrong2: "尚未代入數值", default: "代入過程有誤"});
    }

    function setupStep2() {
        let correct = currentQ.am;
        let wrong1 = -currentQ.am; 
        let wrong2 = currentQ.a + currentQ.x; 
        let wrong3 = Math.abs(currentQ.a * currentQ.x) + 1; 

        let options = shuffleArray(Array.from(new Set([correct, wrong1, wrong2, wrong3])));
        while(options.length < 4) options.push(correct + getRandomInt(1, 5));

        renderOptions(2, options, correct, () => {
            if(isFirstTryQ2) totalScore += 2; // 步驟分
            document.getElementById('step3').style.display = 'block';
            setupStep3();
        }, `請問 $${currentQ.a} \\times ${formatNum(currentQ.x)}$ 的結果是？`, {wrong1: "請注意正負號", wrong2: "應使用乘法運算", default: "乘法計算有誤"});
    }

    function setupStep3() {
        let correct = currentQ.y;
        let wrong1 = currentQ.am - currentQ.b; 
        let wrong2 = currentQ.am + currentQ.b + 1; 
        let wrong3 = currentQ.am; 

        let options = shuffleArray(Array.from(new Set([correct, wrong1, wrong2, wrong3])));
        while(options.length < 4) options.push(correct + getRandomInt(-3, 3));

        let opText = currentQ.b >= 0 ? '+' : '-';
        renderOptions(3, options, correct, () => {
            if(isFirstTryQ3) totalScore += 2; // 步驟分
            document.getElementById('step4').style.display = 'block';
            setupStep4();
        }, `最後計算 $${currentQ.am} ${opText} ${Math.abs(currentQ.b)} = ?$`, {wrong1: "注意加減符號", wrong3: "尚未運算常數項", default: "最後計算有誤"});
    }

    function setupStep4() {
        let correct = `(${currentQ.x}, ${currentQ.y})`;
        let wrong1 = `(${currentQ.y}, ${currentQ.x})`; 
        let wrong2 = `(${currentQ.a}, ${currentQ.b})`; 
        let wrong3 = `(${currentQ.x}, 0)`; 

        let options = shuffleArray(Array.from(new Set([correct, wrong1, wrong2, wrong3])));
        while(options.length < 4) options.push(`(x, y)`);

        renderOptions(4, options, correct, () => {
            if(isFirstTryQ4) totalScore += 2; // 步驟分
            
            // 全對獎勵：若四個標記皆為 true，額外加 2 分
            if(isFirstTryQ1 && isFirstTryQ2 && isFirstTryQ3 && isFirstTryQ4) totalScore += 2;
            
            document.getElementById('next-btn').style.display = 'block';
        }, `此函數圖形會通過坐標平面上哪一點？`, {wrong1: "座標順序為 (x, y)", wrong2: "請使用 x 與函數值", default: "座標概念有誤"});
    }

    function renderOptions(stepNum, options, correct, nextStep, hintText = "", feedbackMap = {}) {
        const container = document.getElementById(`options${stepNum}`);
        if(hintText) document.getElementById(`step${stepNum}-hint`).innerHTML = hintText;
        
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerHTML = `$${opt}$`; 
            btn.onclick = () => {
                if (String(opt) === String(correct)) {
                    btn.classList.add('correct');
                    disableAllInStep(stepNum);
                    document.getElementById(`q${stepNum}-feedback`).style.color = "var(--success-color)";
                    document.getElementById(`q${stepNum}-feedback`).innerText = "正確！";
                    nextStep();
                } else {
                    btn.classList.add('wrong');
                    let msg = feedbackMap.default || "再試一次";
                    if(feedbackMap.wrong1 && String(opt).includes('+') && !String(correct).includes('+')) msg = feedbackMap.wrong1;
                    document.getElementById(`q${stepNum}-feedback`).style.color = "var(--error-color)";
                    document.getElementById(`q${stepNum}-feedback`).innerText = msg;
                    markError(stepNum);
                }
            };
            container.appendChild(btn);
        });
        if (window.MathJax) MathJax.typeset();
    }

    function markError(num) {
        if(num === 1) isFirstTryQ1 = false;
        if(num === 2) isFirstTryQ2 = false;
        if(num === 3) isFirstTryQ3 = false;
        if(num === 4) isFirstTryQ4 = false;
    }

    function disableAllInStep(num) {
        const btns = document.getElementById(`options${num}`).querySelectorAll('.btn');
        btns.forEach(b => b.disabled = true);
    }

    function resetStepUI() {
        isFirstTryQ1 = isFirstTryQ2 = isFirstTryQ3 = isFirstTryQ4 = true;
        for(let i=2; i<=4; i++) {
            document.getElementById(`step${i}`).style.display = 'none';
            if(i===2) document.getElementById('step2-hint').innerText = "Step 2. 計算乘法部分";
            if(i===3) document.getElementById('step3-hint').innerText = "Step 3. 得到最終結果";
        }
        document.getElementById('next-btn').style.display = 'none';
        ['1','2','3','4'].forEach(num => {
            document.getElementById(`options${num}`).innerHTML = '';
            document.getElementById(`q${num}-feedback`).innerText = '';
        });
    }

    function showResult() {
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = totalScore + " 分";
    }

    function resetQuiz() {
        questionCount = 0;
        totalScore = 0;
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('start-screen').style.display = 'block';
    }

    window.onload = function() {
        new QRCode(document.getElementById("qrcode"), {
            text: window.location.href,
            width: 128,
            height: 128
        });
    };
</script>

</body>
</html>
