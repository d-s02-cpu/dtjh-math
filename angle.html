<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>苗栗大同國中資源中心 - 幾何基礎練習</title>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script type="text/javascript" id="MathJax-script" async
        src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #4caf50; 
            --accent-color: #ff9800;
            --success-color: #4caf50;
            --error-color: #f44336;
            --bg-color: #f5f7fa;
            --step-bg: #fffbe6;
        }
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }
        .container {
            background: white; padding: 2rem; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%; max-width: 550px; text-align: center;
        }
        .question-text { font-size: 1.1rem; color: #555; margin-bottom: 0.5rem; text-align: left; }
        #question-box {
            font-size: 1.5rem; margin: 0.5rem 0 1.5rem 0; padding: 1rem;
            background: #f8f9fa; border-radius: 12px; border: 1px solid #eee;
        }
        #canvas-holder {
            display: flex; justify-content: center; margin-bottom: 1rem;
            background: #fff; border-radius: 10px;
        }
        .step-container {
            margin-top: 1rem; padding: 1rem; border-radius: 15px;
            background: var(--step-bg); border: 1px dashed #ffe58f;
            display: none; 
        }
        .step-title { font-weight: bold; margin-bottom: 10px; color: #856404; display: block; text-align: left; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn {
            padding: 1rem; font-size: 1.1rem; border: 2px solid var(--primary-color);
            background: white; border-radius: 10px; cursor: pointer; transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:disabled { cursor: not-allowed; opacity: 0.8; }
        .correct { background: var(--success-color) !important; color: white; border-color: var(--success-color); }
        .wrong { background: var(--error-color) !important; color: white; border-color: var(--error-color); }
        #next-btn {
            margin-top: 1.5rem; padding: 1rem; background: var(--primary-color);
            color: white; border: none; border-radius: 50px; font-size: 1.1rem;
            display: none; width: 100%; cursor: pointer;
        }
        .feedback-text { color: var(--error-color); font-weight: bold; margin-bottom: 10px; min-height: 1.2rem; }
        #quiz-status { display: flex; justify-content: space-between; margin-bottom: 1rem; color: #666; font-weight: bold; align-items: center; }
        .mode-badge { font-size: 0.85rem; padding: 4px 12px; border-radius: 20px; background: #eee; color: #555; }
        
        #start-screen, #quiz-container, #result-screen { display: none; }
        #start-screen { display: block; } 
        
        .score-display { font-size: 3rem; color: var(--primary-color); margin: 1rem 0; }
        .desc-text { color: #666; margin-bottom: 1.5rem; line-height: 1.6; }

        #qrcode-container {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        #qrcode {
            padding: 10px;
            background: white;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>

<div class="container" id="start-screen">
    <h2>苗栗大同國中資源中心</h2>
    <h3>國二幾何基礎循序練習</h3>
    <div class="desc-text">
        請選擇練習模式：
    </div>
    <div style="display: flex; flex-direction: column; gap: 10px;">
        <button class="btn" onclick="startQuiz('mode1')">模式一：角度的分類</button>
        <button class="btn" onclick="startQuiz('mode2')">模式二：互補跟互餘</button>
        <button class="btn" onclick="startQuiz('mode3')">模式三：正多邊形的內角</button>
        <button class="btn" onclick="startQuiz('mode4')">模式四：三角形外角定理</button>
    </div>
    
    <div id="qrcode-container">
        <div id="qrcode"></div>
        <span style="font-size: 0.8rem; color: #888;">掃描 QR Code 分享練習</span>
    </div>
</div>

<div class="container" id="quiz-container">
    <div id="quiz-status">
        <span id="question-number">第 1 題 / 共 10 題</span>
        <span id="mode-badge" class="mode-badge">練習模式</span>
    </div>

    <div class="question-text" id="mode-text">請根據題目回答：</div>
    <div id="question-box"></div>
    <div id="canvas-holder"></div>

    <div id="step-box-1" class="step-container">
        <span class="step-title" id="step-title-1">Step 1</span>
        <div id="feedback-1" class="feedback-text"></div>
        <div class="options-grid" id="options-1"></div>
    </div>

    <div id="step-box-2" class="step-container">
        <span class="step-title" id="step-title-2">Step 2</span>
        <div id="feedback-2" class="feedback-text"></div>
        <div class="options-grid" id="options-2"></div>
    </div>

    <div id="step-box-3" class="step-container">
        <span class="step-title" id="step-title-3">Step 3</span>
        <div id="feedback-3" class="feedback-text"></div>
        <div class="options-grid" id="options-3"></div>
    </div>

    <div id="step-box-4" class="step-container">
        <span class="step-title" id="step-title-4">Step 4</span>
        <div id="feedback-4" class="feedback-text"></div>
        <div class="options-grid" id="options-4"></div>
    </div>

    <button id="next-btn" onclick="generateQuestion()">下一題</button>
</div>

<div class="container" id="result-screen">
    <h2>練習完成！</h2>
    <div class="score-display" id="final-score">0</div>
    <p>滿分 100 分，測驗結束。</p>
    <button class="btn" style="width: 100%; background: var(--primary-color); color: white;" onclick="resetQuiz()">回主選單</button>
</div>

<script>
    let quizMode = '';
    let questionCount = 0;
    let totalScore = 0;
    let stepsCorrectInRound = 0;
    let isFirstTry = [true, true, true, true];
    let p5Instance = null;

    const sketch = (p) => {
        let targetDegree = 0;
        p.setup = () => {
            p.createCanvas(240, 180);
            p.noLoop();
        };
        p.drawAngle = (deg) => {
            targetDegree = deg;
            p.redraw();
        };
        p.draw = () => {
            p.clear();
            p.translate(p.width / 2 + 40, p.height / 2 + 30);
            p.stroke(50);
            p.strokeWeight(3);
            p.line(0, 0, -80, 0);
            p.push();
            p.rotate(p.radians(-targetDegree));
            p.line(0, 0, -80, 0);
            p.pop();
            p.noFill();
            p.stroke(255, 152, 0);
            p.strokeWeight(2);
            let arcSize = 50;
            p.arc(0, 0, arcSize, arcSize, p.radians(180 - targetDegree), p.radians(180));
        };
    };

    function startQuiz(mode) {
        quizMode = mode;
        questionCount = 0;
        totalScore = 0;
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-container').style.display = 'block';
        if (!p5Instance) {
            p5Instance = new p5(sketch, 'canvas-holder');
        }
        const badges = {'mode1': '角度分類', 'mode2': '互補互餘', 'mode3': '正多邊形', 'mode4': '外角定理'};
        document.getElementById('mode-badge').innerText = '模式：' + badges[mode];
        generateQuestion();
    }

    function generateQuestion() {
        if (questionCount >= 10) { showResult(); return; }
        questionCount++;
        document.getElementById('question-number').innerText = `第 ${questionCount} 題 / 共 10 題`;
        stepsCorrectInRound = 0;
        isFirstTry = [true, true, true, true];
        for(let i=1; i<=4; i++) {
            document.getElementById(`step-box-${i}`).style.display = 'none';
            document.getElementById(`options-${i}`).innerHTML = '';
            document.getElementById(`feedback-${i}`).innerText = '';
        }
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('canvas-holder').style.display = (quizMode === 'mode1') ? 'flex' : 'none';

        if (quizMode === 'mode1') setupMode1();
        else if (quizMode === 'mode2') setupMode2();
        else if (quizMode === 'mode3') setupMode3();
        else if (quizMode === 'mode4') setupMode4();
        MathJax.typesetPromise();
    }

    function setupMode1() {
        const angles = [
            { name: '銳角', range: [1, 89] },
            { name: '直角', val: 90 },
            { name: '鈍角', range: [91, 179] },
            { name: '平角', val: 180 },
            { name: '周角', val: 360 }
        ];
        const target = angles[Math.floor(Math.random() * angles.length)];
        let degree = target.val || Math.floor(Math.random() * (target.range[1] - target.range[0] + 1)) + target.range[0];
        
        document.getElementById('question-box').innerHTML = `請問 $${degree}^{\\circ}$ 是屬於哪一種角？`;
        if(p5Instance) p5Instance.drawAngle(degree);

        document.getElementById('step-box-1').style.display = 'block';
        document.getElementById('step-title-1').innerText = "請選擇正確分類：";
        
        const choices = ['銳角', '直角', '鈍角', '平角', '周角'];
        renderOptionsMode1(1, choices, target.name, (correct) => {
            if (correct && isFirstTry[0]) totalScore += 10;
            document.getElementById('next-btn').style.display = 'block';
        });
    }

    function renderOptionsMode1(stepIdx, choices, correctValue, callback) {
        const container = document.getElementById(`options-${stepIdx}`);
        const feedback = document.getElementById(`feedback-${stepIdx}`);
        const tips = {
            '銳角': '0度 < 銳角 < 90度',
            '直角': '直角 = 90度',
            '鈍角': '90度 < 鈍角 < 180度',
            '平角': '平角 = 180度',
            '周角': '周角 = 360度'
        };

        choices.forEach(val => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerHTML = val;
            btn.onclick = () => {
                if (val === correctValue) {
                    btn.classList.add('correct');
                    container.querySelectorAll('.btn').forEach(b => b.disabled = true);
                    feedback.innerText = '答對了！' + tips[val];
                    feedback.style.color = 'var(--success-color)';
                    callback(true);
                } else {
                    btn.classList.add('wrong');
                    isFirstTry[stepIdx-1] = false;
                    feedback.innerText = '不對喔，' + tips[val] + '，再試一次！';
                    feedback.style.color = 'var(--error-color)';
                    callback(false);
                }
            };
            container.appendChild(btn);
        });
    }

    function setupMode2() {
        const isComp = Math.random() > 0.5;
        const targetSum = isComp ? 90 : 180;
        const val = Math.floor(Math.random() * (targetSum - 20)) + 10;
        
        const knownIsA = Math.random() > 0.5;
        const knownAngle = knownIsA ? "$\\angle A$" : "$\\angle B$";
        const unknownAngle = knownIsA ? "$\\angle B$" : "$\\angle A$";

        document.getElementById('question-box').innerHTML = `如果 $\\angle A$ 和 $\\angle B$ ${isComp?"互餘":"互補"}，已知 ${knownAngle} = $${val}^{\\circ}$，那麼 ${unknownAngle} 為多少度？`;
        
        document.getElementById('step-box-1').style.display = 'block';
        document.getElementById('step-title-1').innerText = `Step 1. $\\angle A + \\angle B$ 是幾度？`;
        
        renderOptionsMode2Step1(1, ['$90^{\\circ}$', '$180^{\\circ}$', '無法確定', '以上皆非'], `$${targetSum}^{\\circ}$`, isComp, (correct) => {
            if (correct) {
                if(isFirstTry[0]) { totalScore += 3; stepsCorrectInRound++; }
                document.getElementById('step-box-2').style.display = 'block';
                setupMode2Step2(targetSum, val, unknownAngle);
            }
        });
        MathJax.typesetPromise();
    }

    function renderOptionsMode2Step1(stepIdx, choices, correctValue, isComp, callback) {
        const container = document.getElementById(`options-${stepIdx}`);
        const feedback = document.getElementById(`feedback-${stepIdx}`);
        choices.forEach(val => {
            const btn = document.createElement('button');
            btn.className = 'btn'; btn.innerHTML = val;
            btn.onclick = () => {
                if (val === correctValue) {
                    btn.classList.add('correct');
                    container.querySelectorAll('.btn').forEach(b => b.disabled = true);
                    feedback.innerText = '答對了！'; feedback.style.color = 'var(--success-color)';
                    callback(true);
                } else {
                    btn.classList.add('wrong'); isFirstTry[stepIdx-1] = false;
                    feedback.style.color = 'var(--error-color)';
                    if (!isComp && val === '$90^{\\circ}$') {
                        feedback.innerText = '互餘才是90度';
                    } else if (isComp && val === '$180^{\\circ}$') {
                        feedback.innerText = '互補才是180度';
                    } else {
                        feedback.innerText = '不對喔，再試一次！';
                    }
                    callback(false);
                }
            };
            container.appendChild(btn);
        });
    }

    function setupMode2Step2(sum, val, unknown) {
        document.getElementById('step-title-2').innerText = `Step 2. 哪一個算式可以正確算出 ${unknown}？`;
        renderOptions(2, [`$${sum} - ${val}$`, `$${sum} + ${val}$`, `$${val} - ${sum}$`, `$180 - 90$`].sort(()=>Math.random()-0.5), `$${sum} - ${val}$`, (correct) => {
            if (correct) {
                if(isFirstTry[1]) { totalScore += 3; stepsCorrectInRound++; }
                document.getElementById('step-box-3').style.display = 'block';
                setupMode2Step3(sum - val, unknown);
            }
        });
        MathJax.typesetPromise();
    }

    function setupMode2Step3(ans, unknown) {
        document.getElementById('step-title-3').innerText = `Step 3. 最後，${unknown} 等於幾度？`;
        const choices = [ans, ans+5, ans-5, 180-ans].sort(()=>Math.random()-0.5).map(c=>`$${c}^{\\circ}$`);
        const correctVal = `$${ans}^{\\circ}$`;
        
        renderOptions(3, choices, correctVal, (correct) => {
            if (correct) {
                if(isFirstTry[2]) { totalScore += 3; stepsCorrectInRound++; }
                if(stepsCorrectInRound === 3) totalScore += 1;
                document.getElementById('next-btn').style.display = 'block';
            }
        });
        MathJax.typesetPromise();
    }

    // --- Mode 3 Logic (Optimized) ---
    function toChineseNumber(n) {
        const chineseArr = ['零', '一', '二', '三', '四', '五', '六', '七', '八', '九', '十', '十一', '十二'];
        if (n <= 12) return chineseArr[n];
        return n; 
    }

    function setupMode3() {
        let n, sum;
        // 確保 (n-2)*180 能被 n 整除，且不出現小數點
        while(true) {
            n = Math.floor(Math.random() * 7) + 3; // 3 到 9 邊形
            sum = (n - 2) * 180;
            if (sum % n === 0) break;
        }

        const chineseN = toChineseNumber(n);
        document.getElementById('question-box').innerHTML = `正 ${chineseN} 邊形的每一個內角都是幾度？`;
        document.getElementById('step-box-1').style.display = 'block';
        document.getElementById('step-title-1').innerText = `Step 1. 正 ${chineseN} 邊形可以拆成幾個三角形？`;
        
        const container = document.getElementById('options-1');
        const feedback = document.getElementById('feedback-1');
        
        // 生成不重複選項
        let choiceSet = new Set();
        choiceSet.add(n-2);
        while(choiceSet.size < 4) {
            let fake = Math.max(1, (n-2) + Math.floor(Math.random()*7) - 3);
            choiceSet.add(fake);
        }
        const choices = Array.from(choiceSet).sort((a,b)=>a-b).map(c => `$${c}$`);
        const correctVal = `$${n-2}$`;

        choices.forEach(val => {
            const btn = document.createElement('button');
            btn.className = 'btn'; btn.innerHTML = val;
            btn.onclick = () => {
                if (val === correctVal) {
                    btn.classList.add('correct');
                    container.querySelectorAll('.btn').forEach(b => b.disabled = true);
                    feedback.innerText = '答對了！'; feedback.style.color = 'var(--success-color)';
                    if(isFirstTry[0]) totalScore += 2;
                    document.getElementById('step-box-2').style.display = 'block';
                    setupMode3Step2(n, chineseN);
                } else {
                    btn.classList.add('wrong'); isFirstTry[0] = false;
                    feedback.innerHTML = '不對喔，正 $n$ 邊形可拆成 $n-2$ 個三角形，再試一次！';
                    feedback.style.color = 'var(--error-color)';
                    MathJax.typesetPromise([feedback]);
                }
            };
            container.appendChild(btn);
        });
        MathJax.typesetPromise();
    }

    function setupMode3Step2(n, chineseN) {
        document.getElementById('step-title-2').innerText = `Step 2. 三角形的內角和是幾度？`;
        renderOptions(2, ['$180^{\\circ}$', '$90^{\\circ}$', '$360^{\\circ}$', '$540^{\\circ}$'], '$180^{\\circ}$', (correct) => {
            if (correct) {
                if(isFirstTry[1]) totalScore += 2;
                document.getElementById('step-box-3').style.display = 'block';
                setupMode3Step3(n, chineseN);
            }
        });
        MathJax.typesetPromise();
    }

    function setupMode3Step3(n, chineseN) {
        const triangleCount = n - 2;
        const sum = triangleCount * 180;
        document.getElementById('step-title-3').innerText = `Step 3. 正 ${chineseN} 邊形的內角和是幾度？`;
        
        let choiceSet = new Set();
        choiceSet.add(sum);
        while(choiceSet.size < 4) {
            let fake = ( (n - 2 + Math.floor(Math.random()*5) - 2) * 180 );
            if(fake > 0) choiceSet.add(fake);
        }
        const choices = Array.from(choiceSet).sort((a,b)=>a-b).map(c=>`$${c}^{\\circ}$`);
        const correctVal = `$${sum}^{\\circ}$`;
        
        const container = document.getElementById('options-3');
        const feedback = document.getElementById('feedback-3');
        
        choices.forEach(val => {
            const btn = document.createElement('button');
            btn.className = 'btn'; btn.innerHTML = val;
            btn.onclick = () => {
                if (val === correctVal) {
                    btn.classList.add('correct');
                    container.querySelectorAll('.btn').forEach(b => b.disabled = true);
                    feedback.innerText = '答對了！'; feedback.style.color = 'var(--success-color)';
                    if(isFirstTry[2]) totalScore += 3;
                    document.getElementById('step-box-4').style.display = 'block';
                    setupMode3Step4(n, sum);
                } else {
                    btn.classList.add('wrong'); isFirstTry[2] = false;
                    feedback.innerHTML = `不對喔，內角和 = 三角形個數 $\\times 180^{\\circ}$，即 $${triangleCount} \\times 180^{\\circ}$`;
                    feedback.style.color = 'var(--error-color)';
                    MathJax.typesetPromise([feedback]);
                }
            };
            container.appendChild(btn);
        });
        MathJax.typesetPromise();
    }

    function setupMode3Step4(n, sum) {
        const ans = sum / n;
        document.getElementById('step-title-4').innerText = `Step 4. 最後，每一個內角是幾度？`;
        
        let choiceSet = new Set();
        choiceSet.add(ans);
        let offsets = [-20, -10, 10, 20, 30, 40];
        while(choiceSet.size < 4) {
            let fake = ans + offsets[Math.floor(Math.random()*offsets.length)];
            if(fake > 0 && fake < 180) choiceSet.add(fake);
        }
        const choices = Array.from(choiceSet).sort((a,b)=>a-b).map(c=>`$${c}^{\\circ}$`);
        const correctVal = `$${ans}^{\\circ}$`;
        
        const container = document.getElementById('options-4');
        const feedback = document.getElementById('feedback-4');

        choices.forEach(val => {
            const btn = document.createElement('button');
            btn.className = 'btn'; btn.innerHTML = val;
            btn.onclick = () => {
                if (val === correctVal) {
                    btn.classList.add('correct');
                    container.querySelectorAll('.btn').forEach(b => b.disabled = true);
                    feedback.innerText = '答對了！'; feedback.style.color = 'var(--success-color)';
                    if(isFirstTry[3]) totalScore += 3;
                    document.getElementById('next-btn').style.display = 'block';
                } else {
                    btn.classList.add('wrong'); isFirstTry[3] = false;
                    feedback.innerHTML = `不對喔，每一個內角 = 內角和 $\\div n$，即 $${sum}^{\\circ} \\div ${n}$`;
                    feedback.style.color = 'var(--error-color)';
                    MathJax.typesetPromise([feedback]);
                }
            };
            container.appendChild(btn);
        });
        MathJax.typesetPromise();
    }

    function setupMode4() {
        const a = Math.floor(Math.random() * 40) + 30, b = Math.floor(Math.random() * 40) + 30;
        document.getElementById('question-box').innerHTML = `三角形 ABC 中，$\\angle 1$ 是 $\\angle C$ 的外角。若 $\\angle A = ${a}^{\\circ}$、$\\angle B = ${b}^{\\circ}$，請問 $\\angle 1$ 為幾度？`;
        document.getElementById('step-box-1').style.display = 'block';
        document.getElementById('step-title-1').innerText = `Step 1. $\\angle 1$ 是哪一個角的外角？`;
        renderOptions(1, ['$\\angle A$', '$\\angle B$', '$\\angle C$', '都不是'], '$\\angle C$', (correct) => {
            if (correct) {
                if(isFirstTry[0]) { totalScore += 3; stepsCorrectInRound++; }
                document.getElementById('step-box-2').style.display = 'block';
                setupMode4Step2(a + b);
            }
        });
    }

    function setupMode4Step2(ans) {
        document.getElementById('step-title-2').innerText = `Step 2. $\\angle 1$ 等於哪兩個內角的和？`;
        renderOptions(2, ['$\\angle A + \\angle B$', '$\\angle B + \\angle C$', '$\\angle A + \\angle C$', '180度'], '$\\angle A + \\angle B$', (correct) => {
            if (correct) {
                if(isFirstTry[1]) { totalScore += 3; stepsCorrectInRound++; }
                document.getElementById('step-box-3').style.display = 'block';
                setupMode4Step3(ans);
            }
        });
        MathJax.typesetPromise();
    }

    function setupMode4Step3(ans) {
        document.getElementById('step-title-3').innerText = `Step 3. 最後，$\\angle 1$ 等於多少度？`;
        renderOptions(3, [ans, 180-ans, ans+10, 90].sort(()=>Math.random()-0.5).map(c=>`$${c}^{\\circ}$`), `$${ans}^{\\circ}$`, (correct) => {
            if (correct) {
                if(isFirstTry[2]) { totalScore += 3; stepsCorrectInRound++; }
                if(stepsCorrectInRound === 3) totalScore += 1;
                document.getElementById('next-btn').style.display = 'block';
            }
        });
        MathJax.typesetPromise();
    }

    function renderOptions(stepIdx, choices, correctValue, callback) {
        const container = document.getElementById(`options-${stepIdx}`);
        const feedback = document.getElementById(`feedback-${stepIdx}`);
        choices.forEach(val => {
            const btn = document.createElement('button');
            btn.className = 'btn'; btn.innerHTML = val;
            btn.onclick = () => {
                if (val.toString() === correctValue.toString()) {
                    btn.classList.add('correct');
                    container.querySelectorAll('.btn').forEach(b => b.disabled = true);
                    feedback.innerText = '答對了！'; feedback.style.color = 'var(--success-color)';
                    callback(true);
                } else {
                    btn.classList.add('wrong'); isFirstTry[stepIdx-1] = false;
                    feedback.innerText = '不對喔，再試一次！'; feedback.style.color = 'var(--error-color)';
                    callback(false);
                }
            };
            container.appendChild(btn);
        });
    }

    function showResult() {
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = totalScore + " 分";
    }

    function resetQuiz() {
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('start-screen').style.display = 'block';
    }

    window.onload = function() {
        new QRCode(document.getElementById("qrcode"), { text: window.location.href, width: 128, height: 128 });
    };
</script>
</body>
</html>
