<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>苗栗大同國中資源中心 - 整數加減練習</title>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script type="text/javascript" id="MathJax-script" async
        src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #4caf50; 
            --accent-color: #ff9800;
            --success-color: #4caf50;
            --error-color: #f44336;
            --bg-color: #f5f7fa;
            --step-bg: #fffbe6;
        }
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }
        .container {
            background: white; padding: 2rem; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%; max-width: 550px; text-align: center;
        }
        .question-text { font-size: 1.1rem; color: #555; margin-bottom: 0.5rem; text-align: left; }
        #question-box {
            font-size: 1.8rem; margin: 0.5rem 0 1.5rem 0; padding: 1rem;
            background: #f8f9fa; border-radius: 12px; border: 1px solid #eee;
        }
        .step-container {
            margin-top: 1rem; padding: 1rem; border-radius: 15px;
            background: var(--step-bg); border: 1px dashed #ffe58f;
            display: none; 
        }
        .step-title { font-weight: bold; margin-bottom: 10px; color: #856404; display: block; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn {
            padding: 1rem; font-size: 1.1rem; border: 2px solid var(--primary-color);
            background: white; border-radius: 10px; cursor: pointer; transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:disabled { cursor: not-allowed; opacity: 0.8; }
        .correct { background: var(--success-color) !important; color: white; border-color: var(--success-color); }
        .wrong { background: var(--error-color) !important; color: white; border-color: var(--error-color); }
        #next-btn {
            margin-top: 1.5rem; padding: 1rem; background: var(--primary-color);
            color: white; border: none; border-radius: 50px; font-size: 1.1rem;
            display: none; width: 100%; cursor: pointer;
        }
        .feedback-text { color: var(--error-color); font-weight: bold; margin-bottom: 10px; min-height: 1.2rem; }
        #quiz-status { display: flex; justify-content: space-between; margin-bottom: 1rem; color: #666; font-weight: bold; align-items: center; }
        .mode-badge { font-size: 0.85rem; padding: 4px 12px; border-radius: 20px; background: #eee; color: #555; }
        
        #start-screen, #quiz-container, #result-screen { display: none; }
        #start-screen { display: block; } 
        
        .score-display { font-size: 3rem; color: var(--primary-color); margin: 1rem 0; }
        .desc-text { color: #666; margin-bottom: 1.5rem; line-height: 1.6; }

        #qrcode-container {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        #qrcode {
            padding: 10px;
            background: white;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>

<div class="container" id="start-screen">
    <h2>苗栗大同國中資源中心</h2>
    <h3>整數加減循序練習</h3>
    <div class="desc-text">
        本單元練習型態：$-a+b$ 與 $-a-b$。<br>
        拆解思考步驟，建立正負數運算邏輯。
    </div>
    <div style="display: flex; flex-direction: column; gap: 15px;">
        <button class="btn" style="background: var(--primary-color); color: white; border-color: var(--primary-color);" onclick="startQuiz('stepByStep')">開始練習：模式一 (循序拆解)</button>
        <button class="btn" style="background: var(--accent-color); color: white; border-color: var(--accent-color);" onclick="startQuiz('direct')">開始練習：模式二 (挑戰模式)</button>
    </div>
    
    <div id="qrcode-container">
        <div id="qrcode"></div>
        <span style="font-size: 0.8rem; color: #888;">掃描 QR Code 分享練習</span>
    </div>
</div>

<div class="container" id="quiz-container">
    <div id="quiz-status">
        <span id="question-number">第 1 題 / 共 10 題</span>
        <span id="mode-badge" class="mode-badge">練習模式</span>
    </div>

    <div class="question-text" id="mode-text">請計算下列算式之值：</div>
    <div id="question-box"></div>

    <div id="step1" class="step-container">
        <span class="step-title" id="step1-title">Step 1. 判斷增減關係</span>
        <div id="q1-feedback" class="feedback-text"></div>
        <div class="options-grid" id="options1"></div>
    </div>

    <div id="step2" class="step-container">
        <span class="step-title" id="step2-title">Step 2. 判斷最終正負</span>
        <div id="q2-feedback" class="feedback-text"></div>
        <div class="options-grid" id="options2"></div>
    </div>

    <div id="step3" class="step-container">
        <span class="step-title" id="step3-title">Step 3. 算出最終結果</span>
        <div id="q3-feedback" class="feedback-text"></div>
        <div class="options-grid" id="options3"></div>
    </div>

    <button id="next-btn" onclick="generateQuestion()">下一題</button>
</div>

<div class="container" id="result-screen">
    <h2>練習完成！</h2>
    <div class="score-display" id="final-score">0</div>
    <p>滿分 100 分，測驗結束。</p>
    <button class="btn" style="width: 100%; background: var(--primary-color); color: white;" onclick="resetQuiz()">回主選單</button>
</div>

<script>
    let currentA = 0;
    let currentB = 0;
    let type = ''; // '-a+b' or '-a-b'
    let questionCount = 0;
    let totalScore = 0;
    let quizMode = 'stepByStep'; // 'stepByStep' or 'direct'
    let stepCountCorrect = 0;
    let isFirstTryQ1 = true, isFirstTryQ2 = true, isFirstTryQ3 = true;

    function startQuiz(mode) {
        quizMode = mode;
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-container').style.display = 'block';
        document.getElementById('mode-badge').innerText = mode === 'stepByStep' ? '目前模式：循序拆解' : '目前模式：挑戰模式';
        generateQuestion();
    }

    function getRandomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function generateQuestion() {
        if (questionCount >= 10) {
            showResult();
            return;
        }

        questionCount++;
        document.getElementById('question-number').innerText = `第 ${questionCount} 題 / 共 10 題`;
        
        isFirstTryQ1 = isFirstTryQ2 = isFirstTryQ3 = true;
        stepCountCorrect = 0;
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'none';
        document.getElementById('step3').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        document.querySelectorAll('.feedback-text').forEach(f => f.innerText = '');
        document.querySelectorAll('.options-grid').forEach(o => o.innerHTML = '');

        type = Math.random() > 0.5 ? '-a+b' : '-a-b';
        currentA = getRandomInt(1, 20);
        currentB = getRandomInt(1, 20);

        if (type === '-a+b') {
            document.getElementById('question-box').innerHTML = `$$ -${currentA} + ${currentB} $$`;
        } else {
            document.getElementById('question-box').innerHTML = `$$ -${currentA} - ${currentB} $$`;
        }

        if (quizMode === 'stepByStep') {
            document.getElementById('step1').style.display = 'block';
            setupStep1();
        } else {
            // 模式二直接顯示結果輸入
            document.getElementById('step3').style.display = 'block';
            setupStep3();
        }
        MathJax.typesetPromise();
    }

    function setupStep1() {
        const container = document.getElementById('options1');
        const feedback = document.getElementById('q1-feedback');
        
        let correct = '';
        let choices = [];

        if (type === '-a+b') {
            document.getElementById('step1-title').innerHTML = `Step 1. 先減 $${currentA}$ 分，再加 $${currentB}$ 分，請問：`;
            choices = ['加的多', '減的多', '一樣多', '不確定'];
            if (currentA > currentB) correct = '減的多';
            else if (currentB > currentA) correct = '加的多';
            else correct = '一樣多';
        } else {
            document.getElementById('step1-title').innerHTML = `Step 1. 先減 $${currentA}$ 分，再減 $${currentB}$ 分，最後分數一定是正的還是負的？`;
            correct = '負的';
            choices = ['正的', '負的', '都不是', '不確定'];
        }

        choices.sort(() => Math.random() - 0.5).forEach(val => {
            const btn = document.createElement('button');
            btn.className = 'btn'; btn.innerText = val;
            btn.onclick = () => {
                if (val === correct) {
                    btn.classList.add('correct');
                    if (isFirstTryQ1) { 
                        totalScore += (type === '-a+b') ? 3 : 5; 
                        stepCountCorrect++; 
                    }
                    container.querySelectorAll('.btn').forEach(b => b.disabled = true);
                    
                    if (type === '-a+b') {
                        document.getElementById('step2').style.display = 'block';
                        setupStep2();
                    } else {
                        document.getElementById('step3').style.display = 'block';
                        setupStep3();
                    }
                } else {
                    btn.classList.add('wrong'); isFirstTryQ1 = false;
                    feedback.innerText = (type === '-a+b') ? '想一想，哪邊的數字比較大？' : '一直在減少，分數會變成...？';
                }
            };
            container.appendChild(btn);
        });
        MathJax.typesetPromise();
    }

    function setupStep2() {
        const container = document.getElementById('options2');
        const feedback = document.getElementById('q2-feedback');
        document.getElementById('step2-title').innerText = `Step 2. 承上題，最後的結果會是正的還是負的？`;
        
        let correct = '';
        const resultValue = (-currentA + currentB);
        if (resultValue > 0) correct = '正的';
        else if (resultValue < 0) correct = '負的';
        else correct = '都不是';

        let choices = ['正的', '負的', '都不是', '不確定'];

        choices.sort(() => Math.random() - 0.5).forEach(val => {
            const btn = document.createElement('button');
            btn.className = 'btn'; btn.innerText = val;
            btn.onclick = () => {
                if (val === correct) {
                    btn.classList.add('correct');
                    if (isFirstTryQ2) { totalScore += 3; stepCountCorrect++; }
                    container.querySelectorAll('.btn').forEach(b => b.disabled = true);
                    document.getElementById('step3').style.display = 'block';
                    setupStep3();
                } else {
                    btn.classList.add('wrong'); isFirstTryQ2 = false;
                    feedback.innerText = '看 Step 1 的結果，決定正負號喔！';
                }
            };
            container.appendChild(btn);
        });
    }

    function setupStep3() {
        const container = document.getElementById('options3');
        const feedback = document.getElementById('q3-feedback');
        const resultValue = (type === '-a+b') ? (-currentA + currentB) : (-currentA - currentB);
        
        if (quizMode === 'stepByStep') {
            const stepNum = (type === '-a+b') ? '3' : '2';
            document.getElementById('step3-title').innerText = `Step ${stepNum}. 所以最終結果算出來「得」多少？`;
        } else {
            document.getElementById('step3-title').innerText = `請直接選擇計算結果：`;
        }

        let choiceSet = new Set([resultValue]);
        choiceSet.add(currentA + currentB);
        choiceSet.add(Math.abs(currentA - currentB));
        choiceSet.add(-(currentA + currentB));
        choiceSet.add(currentA - currentB);
        while(choiceSet.size < 4) choiceSet.add(resultValue + getRandomInt(-5, 5));

        Array.from(choiceSet).sort(() => Math.random() - 0.5).forEach(val => {
            const btn = document.createElement('button');
            btn.className = 'btn'; 
            btn.innerHTML = `$${val}$`;
            btn.onclick = () => {
                if (parseInt(val) === resultValue) {
                    btn.classList.add('correct');
                    if (quizMode === 'stepByStep') {
                        if (isFirstTryQ3) { 
                            totalScore += (type === '-a+b') ? 3 : 5; 
                            stepCountCorrect++; 
                        }
                        if (type === '-a+b' && stepCountCorrect === 3) totalScore += 1;
                    } else {
                        // 模式二直接答對得 10 分
                        if (isFirstTryQ3) totalScore += 10;
                    }
                    
                    container.querySelectorAll('.btn').forEach(b => b.disabled = true);
                    document.getElementById('next-btn').style.display = 'block';
                } else {
                    btn.classList.add('wrong'); isFirstTryQ3 = false;
                    feedback.innerText = '計算有誤，請再仔細算一次。';
                }
            };
            container.appendChild(btn);
        });
        MathJax.typesetPromise();
    }

    function showResult() {
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = totalScore + " 分";
    }

    function resetQuiz() {
        questionCount = 0;
        totalScore = 0;
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('start-screen').style.display = 'block';
    }

    window.onload = function() {
        new QRCode(document.getElementById("qrcode"), {
            text: window.location.href,
            width: 128,
            height: 128
        });
    };
</script>

</body>
</html>
