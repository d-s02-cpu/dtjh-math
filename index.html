<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>苗栗大同國中資源中心 - 等差數列練習</title>
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script type="text/javascript" id="MathJax-script" async
        src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #4caf50; /* 模式二底色 */
            --success-color: #4caf50;
            --error-color: #f44336;
            --bg-color: #f5f7fa;
            --step-bg: #fffbe6;
        }
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }
        .container {
            background: white; padding: 2rem; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%; max-width: 550px; text-align: center;
        }
        .question-text { font-size: 1.1rem; color: #555; margin-bottom: 0.5rem; text-align: left; }
        #question-box {
            font-size: 1.8rem; margin: 0.5rem 0 1.5rem 0; padding: 1rem;
            background: #f8f9fa; border-radius: 12px; border: 1px solid #eee;
        }
        .step-container {
            margin-top: 1rem; padding: 1rem; border-radius: 15px;
            background: var(--step-bg); border: 1px dashed #ffe58f;
            display: none; 
        }
        .step-title { font-weight: bold; margin-bottom: 10px; color: #856404; display: block; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn {
            padding: 1rem; font-size: 1.1rem; border: 2px solid var(--primary-color);
            background: white; border-radius: 10px; cursor: pointer; transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:disabled { cursor: not-allowed; opacity: 0.8; }
        .correct { background: var(--success-color) !important; color: white; border-color: var(--success-color); }
        .wrong { background: var(--error-color) !important; color: white; border-color: var(--error-color); }
        #next-btn {
            margin-top: 1.5rem; padding: 1rem; background: var(--primary-color);
            color: white; border: none; border-radius: 50px; font-size: 1.1rem;
            display: none; width: 100%; cursor: pointer;
        }
        .feedback-text { color: var(--error-color); font-weight: bold; margin-bottom: 10px; min-height: 1.2rem; }
        #quiz-status { display: flex; justify-content: space-between; margin-bottom: 1rem; color: #666; font-weight: bold; align-items: center; }
        .mode-badge { font-size: 0.85rem; padding: 4px 12px; border-radius: 20px; background: #eee; color: #555; }
        
        #start-screen, #quiz-container, #result-screen { display: none; }
        #start-screen { display: block; } 
        
        .score-display { font-size: 3rem; color: var(--primary-color); margin: 1rem 0; }
        .desc-text { color: #666; margin-bottom: 1.5rem; line-height: 1.6; }

        #qrcode-container {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        #qrcode {
            padding: 10px;
            background: white;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>

<div class="container" id="start-screen">
    <h2>苗栗大同國中資源中心</h2>
    <h3>等差數列循序練習</h3>
    <div class="desc-text">
        請選擇練習題型：<br>
        難度隨題號增加：純正數 $\rightarrow$ 純負數 $\rightarrow$ 異號。
    </div>
    <div style="display: flex; flex-direction: column; gap: 15px;">
        <button class="btn" style="background: var(--primary-color); color: white; border-color: var(--primary-color);" onclick="startQuiz('findD')">模式一：求公差 $d$</button>
        <button class="btn" style="background: var(--secondary-color); color: white; border-color: var(--secondary-color);" onclick="startQuiz('findAn')">模式二：求第 $n$ 項 $a_n$</button>
    </div>
    
    <div id="qrcode-container">
        <div id="qrcode"></div>
        <span style="font-size: 0.8rem; color: #888;">掃描 QR Code 分享練習</span>
    </div>
</div>

<div class="container" id="quiz-container">
    <div id="quiz-status">
        <span id="question-number">第 1 題 / 共 10 題</span>
        <span id="mode-badge" class="mode-badge">練習模式</span>
    </div>

    <div class="question-text" id="mode-text">等差數列 $a_1, a_2, a_3, \dots$，求公差 $d$：</div>
    <div id="question-box"></div>

    <div id="step1" class="step-container" style="display: block;">
        <span class="step-title" id="step1-title">Q1. 哪一個算式可以算出公差 $d$？</span>
        <div id="q1-feedback" class="feedback-text"></div>
        <div class="options-grid" id="options1"></div>
    </div>

    <div id="step2" class="step-container">
        <span class="step-title" id="step2-hint"></span>
        <div id="q2-feedback" class="feedback-text"></div>
        <div class="options-grid" id="options2"></div>
    </div>

    <div id="step3" class="step-container">
        <span class="step-title" id="step3-hint"></span>
        <div id="q3-feedback" class="feedback-text"></div>
        <div class="options-grid" id="options3"></div>
    </div>

    <div id="step4" class="step-container">
        <span class="step-title" id="step4-hint"></span>
        <div id="q4-feedback" class="feedback-text"></div>
        <div class="options-grid" id="options4"></div>
    </div>

    <button id="next-btn" onclick="generateQuestion()">下一題</button>
</div>

<div class="container" id="result-screen">
    <h2>練習完成！</h2>
    <div class="score-display" id="final-score">0</div>
    <p>滿分 100 分，測驗結束。</p>
    <button class="btn" style="width: 100%; background: var(--primary-color); color: white;" onclick="resetQuiz()">回主選單</button>
</div>

<script>
    let quizMode = 'findD';
    let currentD = 0;
    let currentA1 = 0;
    let currentA2 = 0;
    let currentN = 0;
    let questionCount = 0;
    let totalScore = 0;
    let isFirstTryQ1 = true; 
    let isFirstTryQ2 = true; 
    let isFirstTryQ3 = true;
    let isFirstTryQ4 = true;

    function formatNum(num, isLeading = false) {
        if (num < 0 && !isLeading) return `(${num})`;
        return num.toString();
    }

    function startQuiz(mode) {
        quizMode = mode;
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-container').style.display = 'block';
        
        if (quizMode === 'findD') {
            document.getElementById('mode-badge').innerText = '目前模式：求公差 d';
            document.getElementById('mode-text').innerText = '等差數列 $a_1, a_2, a_3, \\dots$，求公差 $d$：';
            document.getElementById('step1-title').innerText = 'Q1. 哪一個算式可以算出公差 $d$？';
        } else {
            document.getElementById('mode-badge').innerText = '目前模式：求第 n 項';
            document.getElementById('mode-text').innerText = '等差數列 $a_1, a_2, a_3, \\dots$，求指定的 $a_n$：';
            document.getElementById('step1-title').innerText = 'Q1. 公差 $d = ?$';
        }
        
        generateQuestion();
    }

    function getRandomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function generateQuestion() {
        if (questionCount >= 10) {
            showResult();
            return;
        }

        questionCount++;
        document.getElementById('question-number').innerText = `第 ${questionCount} 題 / 共 10 題`;
        isFirstTryQ1 = isFirstTryQ2 = isFirstTryQ3 = isFirstTryQ4 = true;

        document.getElementById('step2').style.display = 'none';
        document.getElementById('step3').style.display = 'none';
        document.getElementById('step4').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('options1').innerHTML = '';
        document.getElementById('options2').innerHTML = '';
        document.getElementById('options3').innerHTML = '';
        document.getElementById('options4').innerHTML = '';
        document.getElementById('q1-feedback').innerText = '';
        document.getElementById('q2-feedback').innerText = '';
        document.getElementById('q3-feedback').innerText = '';
        document.getElementById('q4-feedback').innerText = '';

        if (quizMode === 'findD') {
            if (questionCount <= 5) {
                if (Math.random() > 0.5) { 
                    currentA1 = getRandomInt(1, 15);
                    currentA2 = getRandomInt(currentA1 + 1, currentA1 + 10);
                } else {
                    currentA1 = getRandomInt(5, 20);
                    currentA2 = getRandomInt(1, currentA1 - 1);
                }
            } else if (questionCount <= 8) {
                if (Math.random() > 0.5) {
                    currentA1 = getRandomInt(-15, -1);
                    currentA2 = getRandomInt(1, 15);
                } else {
                    currentA1 = getRandomInt(1, 15);
                    currentA2 = getRandomInt(-15, -1);
                }
            } else {
                if (Math.random() > 0.5) {
                    currentA1 = getRandomInt(-10, -1);
                    currentA2 = getRandomInt(currentA1 - 10, currentA1 - 1);
                } else {
                    currentA1 = getRandomInt(-20, -5);
                    currentA2 = getRandomInt(currentA1 + 1, -1);
                }
            }
        } else {
            currentN = getRandomInt(5, 20);
            if (questionCount <= 4) { 
                currentA1 = getRandomInt(1, 19);
                currentD = getRandomInt(1, 10);
            } else if (questionCount <= 7) { 
                currentA1 = getRandomInt(-19, -1);
                currentD = getRandomInt(-10, -1);
            } else { 
                if (Math.random() > 0.5) {
                    currentA1 = getRandomInt(1, 19);
                    currentD = getRandomInt(-10, -1);
                } else {
                    currentA1 = getRandomInt(-19, -1);
                    currentD = getRandomInt(1, 10);
                }
            }
            currentA2 = currentA1 + currentD;
        }
        
        currentD = currentA2 - currentA1;
        const a3 = currentA2 + currentD;

        if (quizMode === 'findD') {
            document.getElementById('question-box').innerHTML = `$$ ${currentA1}, ${currentA2}, ${a3}, \\dots $$`;
            const s1_correct = `${currentA2} - ${formatNum(currentA1)}`;
            let s1_choices = [
                s1_correct,
                `${currentA1} - ${formatNum(currentA2)}`,
                `${currentA2} + ${formatNum(currentA1)}`,
                `${currentA1} + ${formatNum(currentA2)}`
            ];
            renderStep1(s1_choices, s1_correct);
        } else {
            document.getElementById('question-box').innerHTML = `$$ ${currentA1}, ${currentA2}, ${a3}, \\dots, \\text{求 } a_{${currentN}} $$`;
            let choices = [currentD, -currentD, currentA2 + currentA1, currentA2 + 1];
            let uniqueChoices = Array.from(new Set(choices));
            while (uniqueChoices.length < 4) {
                uniqueChoices.push(uniqueChoices[uniqueChoices.length - 1] + 1);
            }
            renderStep1(uniqueChoices, currentD);
        }
        MathJax.typesetPromise();
    }

    function renderStep1(choices, correctValue) {
        const container = document.getElementById('options1');
        const feedback = document.getElementById('q1-feedback');
        choices.sort(() => Math.random() - 0.5).forEach(val => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerHTML = `$${val}$`;
            btn.onclick = () => {
                if (val === correctValue) {
                    btn.classList.add('correct');
                    if (isFirstTryQ1) {
                        totalScore += (quizMode === 'findD' ? 5 : 2);
                    }
                    feedback.innerText = '';
                    container.querySelectorAll('.btn').forEach(b => b.disabled = true);
                    
                    if (quizMode === 'findD') {
                        document.getElementById('step2-hint').innerHTML = `Q2. 承上題，$d = ${val} = ?$`;
                        document.getElementById('step2').style.display = 'block';
                        setupStep2Options();
                    } else {
                        document.getElementById('step2-hint').innerHTML = `Q2. $a_1$ 與 $a_{${currentN}}$ 差了幾個公差？`;
                        document.getElementById('step2').style.display = 'block';
                        setupStep2Options();
                    }
                    MathJax.typesetPromise();
                } else {
                    btn.classList.add('wrong');
                    isFirstTryQ1 = false;
                    feedback.innerHTML = '提示：$d = a_2 - a_1$';
                    MathJax.typesetPromise();
                }
            };
            container.appendChild(btn);
        });
    }

    function setupStep2Options() {
        const container = document.getElementById('options2');
        const feedback = document.getElementById('q2-feedback');
        container.innerHTML = '';
        
        if (quizMode === 'findD') {
            let choices = [currentA2 + currentA1, currentA2 - currentA1, -currentA2 + currentA1, -currentA2 - currentA1];
            let uniqueChoices = Array.from(new Set(choices));
            while (uniqueChoices.length < 4) {
                let last = uniqueChoices[uniqueChoices.length - 1];
                uniqueChoices.push(last + (Math.floor(Math.random() * 5) + 1));
            }
            uniqueChoices.sort(() => Math.random() - 0.5).forEach(val => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.innerHTML = `$${val}$`;
                btn.onclick = () => {
                    if (val === currentD) {
                        btn.classList.add('correct');
                        if (isFirstTryQ2) totalScore += 5;
                        feedback.innerText = '';
                        container.querySelectorAll('.btn').forEach(b => b.disabled = true);
                        document.getElementById('next-btn').style.display = 'block';
                    } else {
                        btn.classList.add('wrong');
                        isFirstTryQ2 = false;
                        feedback.innerText = '計算錯誤，請再試一次。';
                    }
                };
                container.appendChild(btn);
            });
        } else {
            let correctGap = currentN - 1;
            let choices = [currentN + 1, currentN, currentN - 1, currentN - 2];
            let uniqueChoices = Array.from(new Set(choices));
            uniqueChoices.sort(() => Math.random() - 0.5).forEach(val => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.innerHTML = `${val} 個`;
                btn.onclick = () => {
                    if (val === correctGap) {
                        btn.classList.add('correct');
                        if (isFirstTryQ2) totalScore += 2;
                        feedback.innerText = '';
                        container.querySelectorAll('.btn').forEach(b => b.disabled = true);
                        document.getElementById('step3-hint').innerHTML = `Q3. $a_1$ 與 $a_{${currentN}}$ 相差多少？`;
                        document.getElementById('step3').style.display = 'block';
                        setupStep3Options();
                        MathJax.typesetPromise();
                    } else {
                        btn.classList.add('wrong');
                        isFirstTryQ2 = false;
                        feedback.innerHTML = '提示：$a_n$ 與 $a_1$ 相隔 $n-1$ 個公差';
                        MathJax.typesetPromise();
                    }
                };
                container.appendChild(btn);
            });
        }
    }

    function setupStep3Options() {
        const container = document.getElementById('options3');
        const feedback = document.getElementById('q3-feedback');
        const correctDiff = (currentN - 1) * currentD;
        let choices = [correctDiff, correctDiff + currentD, correctDiff - currentD, -correctDiff];
        let uniqueChoices = Array.from(new Set(choices));
        uniqueChoices.sort(() => Math.random() - 0.5).forEach(val => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerHTML = `$${val}$`;
            btn.onclick = () => {
                if (val === correctDiff) {
                    btn.classList.add('correct');
                    if (isFirstTryQ3) totalScore += 3;
                    feedback.innerText = '';
                    container.querySelectorAll('.btn').forEach(b => b.disabled = true);
                    document.getElementById('step4-hint').innerHTML = `Q4. 最後，$a_{${currentN}} = ?$`;
                    document.getElementById('step4').style.display = 'block';
                    setupStep4Options();
                    MathJax.typesetPromise();
                } else {
                    btn.classList.add('wrong');
                    isFirstTryQ3 = false;
                    feedback.innerHTML = '提示：請計算 $(n-1) \\times d$ 的結果';
                    MathJax.typesetPromise();
                }
            };
            container.appendChild(btn);
        });
    }

    function setupStep4Options() {
        const container = document.getElementById('options4');
        const feedback = document.getElementById('q4-feedback');
        const finalAn = currentA1 + (currentN - 1) * currentD;
        let choices = [finalAn, finalAn + currentD, finalAn - currentD, -finalAn];
        let uniqueChoices = Array.from(new Set(choices));
        uniqueChoices.sort(() => Math.random() - 0.5).forEach(val => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerHTML = `$${val}$`;
            btn.onclick = () => {
                if (val === finalAn) {
                    btn.classList.add('correct');
                    if (isFirstTryQ4) totalScore += 3;
                    feedback.innerText = '';
                    container.querySelectorAll('.btn').forEach(b => b.disabled = true);
                    document.getElementById('next-btn').style.display = 'block';
                } else {
                    btn.classList.add('wrong');
                    isFirstTryQ4 = false;
                    feedback.innerHTML = '提示：$a_n = a_1 + (n-1) \\times d$';
                    MathJax.typesetPromise();
                }
            };
            container.appendChild(btn);
        });
    }

    function showResult() {
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = totalScore + " 分";
    }

    function resetQuiz() {
        questionCount = 0;
        totalScore = 0;
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('start-screen').style.display = 'block';
    }

    window.onload = function() {
        new QRCode(document.getElementById("qrcode"), {
            text: window.location.href,
            width: 128,
            height: 128
        });
    };
</script>

</body>
</html>
